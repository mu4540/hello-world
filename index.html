<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>寒霜診所 ❄️ 廣告同款小遊戲</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a1428;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; border-radius: 8px; box-shadow: 0 0 60px rgba(120,180,255,.15); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
'use strict';

// ===== 畫布（直式）=====
const W = 420, H = 740;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===== 音效 =====
let audioCtx = null;
function beep(freq, dur, type, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.1));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.1));
  } catch (e) {}
}

// ===== 場景配置 =====
const ROAD_Y = 78;                       // 卡車道路
const TRUCK_STOP_X = 110;
const PEN = { x: 232, y: 50, w: 176, h: 150 };   // 候診圍欄
const QCOLS = 5, QSPACE_X = 33, QSPACE_Y = 30;
const DESK = { x: 210, y: 560 };         // 收銀台
const EXIT = { x: 210, y: 780 };
const BED_SLOTS = [
  { x: 70, y: 330 }, { x: 162, y: 330 }, { x: 254, y: 330 }, { x: 346, y: 330 },
  { x: 70, y: 442 }, { x: 162, y: 442 }, { x: 254, y: 442 }, { x: 346, y: 442 }
];
const GOAL_CURED = 50;
const MAX_FROZEN = 10;
const COLD_LIMIT = 40;                   // 候診忍耐秒數
const PAY = 12;                          // 每位病人付費
const BILL_VAL = 4;

// ===== 升級定義 =====
const UPG = {
  bed:   { label: '新病床', icon: '🛏️', costs: [40, 70, 110, 160, 220, 300] },
  carry: { label: '搬運+1', icon: '💪', costs: [80, 200] },
  nurse: { label: '雇護士', icon: '🧑‍⚕️', costs: [150, 350] },
  heal:  { label: '治療加速', icon: '💉', costs: [100, 220, 380] }
};
const PADS = [
  { key: 'bed',   x: 62,  y: 648 },
  { key: 'carry', x: 160, y: 648 },
  { key: 'nurse', x: 258, y: 648 },
  { key: 'heal',  x: 356, y: 648 }
];

// ===== 狀態 =====
let state, snow, floatTexts, bills, flyBills;

function reset() {
  state = {
    phase: 'title',                  // title | play | win | lose
    money: 0,
    cured: 0,
    frozen: 0,
    time: 0,
    wave: 0,
    truckTimer: 4,
    truck: null,                     // {x, patientsLeft, unloadTimer, leaving}
    patients: [],
    beds: BED_SLOTS.map((p, i) => ({ x: p.x, y: p.y, unlocked: i < 2, patient: null, progress: 0 })),
    upgLv: { bed: 0, carry: 0, nurse: 0, heal: 0 },
    padPaid: {},                     // 已投入金額
    player: { x: 210, y: 270, carry: [], grabCd: 0, dropCd: 0, walk: 0, fx: 1 },
    nurses: [],
    hintT: 0
  };
  snow = [];
  for (let i = 0; i < 70; i++) snow.push({ x: Math.random() * W, y: Math.random() * H, s: 1 + Math.random() * 1.6, v: 25 + Math.random() * 40 });
  floatTexts = [];
  bills = [];      // 收銀台上的鈔票堆
  flyBills = [];   // 飛向玩家的鈔票
}
reset();

function carryCap() { return 1 + state.upgLv.carry; }
function healTime() { return 5 * Math.pow(0.75, state.upgLv.heal); }
function freeBed() { return state.beds.find(b => b.unlocked && !b.patient && !b.incoming); }

function addFloat(x, y, text, color, size) {
  floatTexts.push({ x, y, text, color: color || '#fff', life: 1.2, size: size || 16 });
}

function newPatient(x, y) {
  return {
    x, y, state: 'walkToQueue',      // walkToQueue|queue|carried|bed|toDesk|pay|leave|frozen
    queueIdx: -1, cold: 0, bed: null, carrier: null,
    payT: 0, frozenT: 0, bob: Math.random() * 6.28
  };
}

function queuePos(i) {
  const col = i % QCOLS, row = Math.floor(i / QCOLS);
  return { x: PEN.x + 20 + col * QSPACE_X, y: PEN.y + 24 + row * QSPACE_Y };
}

// ===== 輸入：搖桿 + 鍵盤 =====
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let joy = null; // {sx, sy, dx, dy}
function gamePos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) / r.width * W, y: (e.clientY - r.top) / r.height * H };
}
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const p = gamePos(e);
  if (state.phase === 'title') { state.phase = 'play'; beep(880, .15, 'sine', .06); return; }
  if (state.phase === 'win' || state.phase === 'lose') { reset(); state.phase = 'play'; return; }
  joy = { sx: p.x, sy: p.y, dx: 0, dy: 0, id: e.pointerId };
});
canvas.addEventListener('pointermove', e => {
  if (!joy || e.pointerId !== joy.id) return;
  const p = gamePos(e);
  joy.dx = p.x - joy.sx; joy.dy = p.y - joy.sy;
});
window.addEventListener('pointerup', e => { if (joy && e.pointerId === joy.id) joy = null; });
window.addEventListener('pointercancel', () => { joy = null; });

// ===== 更新 =====
let last = performance.now();

function spawnTruck() {
  state.wave++;
  state.truck = { x: -120, patientsLeft: Math.min(3 + state.wave, 10), unloadTimer: 0, leaving: false };
}

function update(dt) {
  if (state.phase !== 'play') return;
  state.time += dt;
  state.hintT += dt;

  // --- 卡車 ---
  if (!state.truck) {
    state.truckTimer -= dt;
    if (state.truckTimer <= 0) spawnTruck();
  } else {
    const t = state.truck;
    if (!t.leaving) {
      if (t.x < TRUCK_STOP_X) t.x += 140 * dt;
      else {
        t.unloadTimer -= dt;
        if (t.unloadTimer <= 0 && t.patientsLeft > 0) {
          t.unloadTimer = 0.45;
          t.patientsLeft--;
          state.patients.push(newPatient(t.x + 40, ROAD_Y + 18));
          beep(500 + Math.random() * 100, .05, 'triangle', .03);
        }
        if (t.patientsLeft <= 0) t.leaving = true;
      }
    } else {
      t.x += 180 * dt;
      if (t.x > W + 140) { state.truck = null; state.truckTimer = Math.max(8, 17 - state.wave * 0.5); }
    }
  }

  // --- 玩家移動 ---
  const pl = state.player;
  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup']) my -= 1;
  if (keys['s'] || keys['arrowdown']) my += 1;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  if (joy) {
    const d = Math.hypot(joy.dx, joy.dy);
    if (d > 8) { mx = joy.dx / d; my = joy.dy / d; }
  }
  const ml = Math.hypot(mx, my);
  if (ml > 0) {
    mx /= ml; my /= ml;
    const sp = 150;
    pl.x = Math.max(16, Math.min(W - 16, pl.x + mx * sp * dt));
    pl.y = Math.max(40, Math.min(H - 20, pl.y + my * sp * dt));
    pl.walk += dt * 10;
    if (Math.abs(mx) > .1) pl.fx = mx > 0 ? 1 : -1;
  }
  pl.grabCd -= dt; pl.dropCd -= dt;

  // --- 排隊邏輯 ---
  const queue = state.patients.filter(p => p.state === 'queue').sort((a, b) => a.queueIdx - b.queueIdx);
  // 重新整理隊伍編號
  queue.forEach((p, i) => { p.queueIdx = i; });
  let nextIdx = queue.length;
  for (const p of state.patients) {
    if (p.state === 'walkToQueue' && p.queueIdx >= nextIdx) nextIdx = p.queueIdx + 1;
  }

  for (const p of state.patients) {
    p.bob += dt * 6;
    if (p.state === 'walkToQueue') {
      if (p.queueIdx < 0) p.queueIdx = nextIdx++;
      const t = queuePos(p.queueIdx);
      const dx = t.x - p.x, dy = t.y - p.y, d = Math.hypot(dx, dy);
      if (d < 3) p.state = 'queue';
      else { p.x += dx / d * 65 * dt; p.y += dy / d * 65 * dt; }
      p.cold += dt;
    } else if (p.state === 'queue') {
      const t = queuePos(p.queueIdx);
      const dx = t.x - p.x, dy = t.y - p.y, d = Math.hypot(dx, dy);
      if (d > 3) { p.x += dx / d * 65 * dt; p.y += dy / d * 65 * dt; }
      p.cold += dt;
      if (p.cold >= COLD_LIMIT) {
        p.state = 'frozen'; p.frozenT = 0;
        state.frozen++;
        addFloat(p.x, p.y - 30, '🥶 凍僵了…', '#9fd4ff');
        beep(180, .25, 'sawtooth', .05);
        if (state.frozen >= MAX_FROZEN) { state.phase = 'lose'; return; }
      }
    } else if (p.state === 'carried') {
      const c = p.carrier;
      const idx = c.carry.indexOf(p);
      p.x = c.x; p.y = c.y - 30 - idx * 16;
    } else if (p.state === 'bed') {
      // 由病床計時
    } else if (p.state === 'toDesk') {
      const dx = DESK.x - p.x, dy = DESK.y - p.y, d = Math.hypot(dx, dy);
      if (d < 6) { p.state = 'pay'; p.payT = 0.4; }
      else { p.x += dx / d * 95 * dt; p.y += dy / d * 95 * dt; }
    } else if (p.state === 'pay') {
      p.payT -= dt;
      if (p.payT <= 0) {
        for (let i = 0; i < PAY / BILL_VAL; i++) {
          bills.push({ x: DESK.x - 26 + Math.random() * 8, y: DESK.y - 8, h: bills.length });
        }
        addFloat(DESK.x, DESK.y - 46, '+$' + PAY, '#7aff9d');
        beep(900, .08, 'sine', .05);
        p.state = 'leave';
      }
    } else if (p.state === 'leave') {
      const dx = EXIT.x - p.x, dy = EXIT.y - p.y, d = Math.hypot(dx, dy);
      p.x += dx / d * 95 * dt; p.y += dy / d * 95 * dt;
    } else if (p.state === 'frozen') {
      p.frozenT += dt;
    }
  }
  state.patients = state.patients.filter(p =>
    !(p.state === 'leave' && p.y > H + 30) && !(p.state === 'frozen' && p.frozenT > 2.5));

  // --- 撿病人（玩家在圍欄附近）---
  const nearPen = pl.x > PEN.x - 28 && pl.x < PEN.x + PEN.w + 28 && pl.y > PEN.y - 28 && pl.y < PEN.y + PEN.h + 40;
  if (nearPen && pl.grabCd <= 0 && pl.carry.length < carryCap()) {
    const q = state.patients.filter(p => p.state === 'queue' || p.state === 'walkToQueue')
      .sort((a, b) => b.cold - a.cold)[0];
    if (q) {
      q.state = 'carried'; q.carrier = pl; q.queueIdx = -1;
      pl.carry.push(q);
      pl.grabCd = 0.22;
      beep(620, .06, 'sine', .04);
    }
  }
  // --- 放病人到病床 ---
  if (pl.carry.length > 0 && pl.dropCd <= 0) {
    for (const b of state.beds) {
      if (!b.unlocked || b.patient) continue;
      if (Math.hypot(pl.x - b.x, pl.y - b.y) < 48) {
        const p = pl.carry.shift();
        p.state = 'bed'; p.carrier = null; p.bed = b;
        p.x = b.x; p.y = b.y - 6;
        b.patient = p; b.progress = 0;
        pl.dropCd = 0.2;
        beep(740, .06, 'sine', .04);
        break;
      }
    }
  }

  // --- 病床治療 ---
  for (const b of state.beds) {
    if (!b.patient) continue;
    b.progress += dt / healTime();
    if (b.progress >= 1) {
      const p = b.patient;
      b.patient = null;
      p.state = 'toDesk'; p.bed = null;
      state.cured++;
      addFloat(b.x, b.y - 40, '✚ 治癒！', '#7aff9d');
      beep(660, .08, 'sine', .05); beep(990, .12, 'sine', .05);
      if (state.cured >= GOAL_CURED) { state.phase = 'win'; return; }
    }
  }

  // --- 護士 AI ---
  for (const n of state.nurses) {
    n.walk += dt * 8;
    if (n.state === 'toPen') {
      const tx = PEN.x + PEN.w / 2, ty = PEN.y + PEN.h + 14;
      const dx = tx - n.x, dy = ty - n.y, d = Math.hypot(dx, dy);
      if (d < 10) {
        const q = state.patients.filter(p => p.state === 'queue' || p.state === 'walkToQueue')
          .sort((a, b) => b.cold - a.cold)[0];
        if (q && freeBed()) {
          q.state = 'carried'; q.carrier = n; q.queueIdx = -1;
          n.carry.push(q);
          const b = freeBed();
          b.incoming = true; n.targetBed = b;
          n.state = 'toBed';
        }
      } else { n.x += dx / d * 95 * dt; n.y += dy / d * 95 * dt; }
    } else if (n.state === 'toBed') {
      const b = n.targetBed;
      if (!b || b.patient) { // 床被占了，重找
        if (b) b.incoming = false;
        const nb = freeBed();
        if (nb) { nb.incoming = true; n.targetBed = nb; }
        else { // 沒床，原地等
          n.targetBed = null;
        }
        if (!n.targetBed) { n.state = 'wait'; continue; }
      }
      const dx = n.targetBed.x - n.x, dy = n.targetBed.y - n.y, d = Math.hypot(dx, dy);
      if (d < 40) {
        const p = n.carry.shift();
        const b2 = n.targetBed;
        p.state = 'bed'; p.carrier = null; p.bed = b2;
        p.x = b2.x; p.y = b2.y - 6;
        b2.patient = p; b2.progress = 0; b2.incoming = false;
        n.targetBed = null; n.state = 'toPen';
      } else { n.x += dx / d * 95 * dt; n.y += dy / d * 95 * dt; }
    } else if (n.state === 'wait') {
      if (freeBed() && n.carry.length > 0) {
        const b = freeBed(); b.incoming = true; n.targetBed = b; n.state = 'toBed';
      } else if (n.carry.length === 0) n.state = 'toPen';
    }
  }

  // --- 收銀台收錢 ---
  if (bills.length > 0 && Math.hypot(pl.x - DESK.x, pl.y - DESK.y) < 55) {
    let take = 0;
    while (bills.length > 0 && take < Math.max(2, Math.ceil(bills.length * 0.15))) {
      const b = bills.pop();
      flyBills.push({ x: b.x, y: DESK.y - 14 - b.h * 3, t: 0 });
      take++;
    }
    if (take > 0) beep(1100 + Math.random() * 200, .05, 'sine', .04);
  }
  for (let i = flyBills.length - 1; i >= 0; i--) {
    const f = flyBills[i];
    f.t += dt * 3.2;
    if (f.t >= 1) { flyBills.splice(i, 1); state.money += BILL_VAL; }
  }

  // --- 升級地板格 ---
  for (const pad of PADS) {
    const lv = state.upgLv[pad.key];
    const costs = UPG[pad.key].costs;
    if (lv >= costs.length) continue;
    if (Math.hypot(pl.x - pad.x, pl.y - pad.y) < 42 && state.money > 0) {
      const cost = costs[lv];
      const paid = state.padPaid[pad.key] || 0;
      const pay = Math.min(state.money, 60 * dt, cost - paid);
      if (pay > 0) {
        state.money -= pay;
        state.padPaid[pad.key] = paid + pay;
        if (state.padPaid[pad.key] >= cost - 0.01) {
          state.padPaid[pad.key] = 0;
          state.upgLv[pad.key]++;
          applyUpgrade(pad.key);
        }
      }
    }
  }

  // --- 雪 ---
  for (const f of snow) {
    f.y += f.v * dt;
    f.x += Math.sin(f.y * .02) * 14 * dt;
    if (f.y > H) { f.y = -5; f.x = Math.random() * W; }
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= dt * 0.8; f.y -= 28 * dt;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }
}

function applyUpgrade(key) {
  if (key === 'bed') {
    const b = state.beds.find(b => !b.unlocked);
    if (b) b.unlocked = true;
    addFloat(W / 2, 300, '🛏️ 新病床啟用！', '#7ad4ff', 20);
  } else if (key === 'carry') {
    addFloat(state.player.x, state.player.y - 60, '💪 一次可搬 ' + carryCap() + ' 人！', '#ffd24a', 18);
  } else if (key === 'nurse') {
    state.nurses.push({ x: DESK.x, y: DESK.y - 40, carry: [], state: 'toPen', targetBed: null, walk: 0 });
    addFloat(W / 2, 300, '🧑‍⚕️ 護士加入！自動搬運病人', '#7aff9d', 18);
  } else if (key === 'heal') {
    addFloat(W / 2, 300, '💉 治療速度提升！', '#ff9dd4', 18);
  }
  beep(660, .1, 'sine', .06); beep(990, .18, 'sine', .06);
}

// ===== 繪圖 =====
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawPerson(x, y, opt) {
  // opt: {sick, frozen, healed, coat, bob, walk, medic, fx}
  const bob = Math.sin(opt.bob || 0) * 1.2 + (opt.walk ? Math.sin(opt.walk) * 1.5 : 0);
  ctx.save();
  ctx.translate(x, y + bob);
  ctx.fillStyle = 'rgba(40,70,110,.22)';
  ctx.beginPath(); ctx.ellipse(0, 11, 10, 3.5, 0, 0, 6.28); ctx.fill();
  // 身體
  ctx.fillStyle = opt.frozen ? '#7ab8e0' : (opt.medic ? '#f0f4f8' : (opt.coat || '#a8423c'));
  roundRect(-7, -10, 14, 21, 5); ctx.fill();
  if (opt.medic) { // 紅十字
    ctx.fillStyle = '#e04848';
    ctx.fillRect(-1.5, -6, 3, 9); ctx.fillRect(-4.5, -3, 9, 3);
  }
  // 頭
  ctx.fillStyle = opt.frozen ? '#9fd0ec' : (opt.sick ? '#e88a6a' : '#f2c9a0');
  ctx.beginPath(); ctx.arc(0, -16, 6.5, 0, 6.28); ctx.fill();
  // 毛帽
  ctx.fillStyle = opt.frozen ? '#c8e8fa' : (opt.medic ? '#e04848' : '#e8eef5');
  ctx.beginPath(); ctx.arc(0, -18.5, 6.5, 3.3, 6.1); ctx.fill();
  if (opt.sick && !opt.frozen) {
    // 口罩
    ctx.fillStyle = '#fff';
    roundRect(-4.5, -16, 9, 5.5, 2); ctx.fill();
    // 發燒紅暈
    ctx.fillStyle = 'rgba(220,60,60,.5)';
    ctx.beginPath(); ctx.arc(-4, -14.5, 1.6, 0, 6.28); ctx.arc(4, -14.5, 1.6, 0, 6.28); ctx.fill();
  } else if (opt.healed) {
    ctx.strokeStyle = '#7a4a2a'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0, -15, 3, 0.3, 2.84); ctx.stroke(); // 微笑
    ctx.fillStyle = '#5a3a1a';
    ctx.beginPath(); ctx.arc(-2.4, -17, .9, 0, 6.28); ctx.arc(2.4, -17, .9, 0, 6.28); ctx.fill();
  }
  if (opt.frozen) {
    ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 1;
    ctx.strokeRect(-9, -26, 18, 38);
  }
  ctx.restore();
}

function drawBillStack(x, y, n, max) {
  const show = Math.min(n, max || 24);
  for (let i = 0; i < show; i++) {
    const yy = y - i * 3;
    ctx.fillStyle = i % 2 ? '#3fae5c' : '#4cc96e';
    roundRect(x - 11, yy - 3, 22, 5, 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.fillRect(x - 3, yy - 2, 6, 3);
  }
}

function drawTruck(t) {
  ctx.save();
  ctx.translate(t.x, ROAD_Y);
  ctx.fillStyle = 'rgba(40,70,110,.25)';
  ctx.beginPath(); ctx.ellipse(0, 22, 56, 8, 0, 0, 6.28); ctx.fill();
  // 車斗
  ctx.fillStyle = '#2a5d9e';
  roundRect(-58, -14, 70, 30, 5); ctx.fill();
  ctx.fillStyle = '#1e4a82';
  roundRect(-58, -14, 70, 8, 4); ctx.fill();
  // 車斗裡的病人
  if (t.patientsLeft > 0) {
    for (let i = 0; i < Math.min(t.patientsLeft, 4); i++) {
      drawPerson(-44 + i * 16, -16, { sick: true, bob: i * 1.7 + performance.now() / 200 });
    }
  }
  // 車頭
  ctx.fillStyle = '#3a78c2';
  roundRect(12, -22, 44, 38, 7); ctx.fill();
  ctx.fillStyle = '#bfe0f5';
  roundRect(34, -16, 16, 14, 3); ctx.fill();
  // 輪子
  ctx.fillStyle = '#222';
  for (const wx of [-40, -10, 36]) { ctx.beginPath(); ctx.arc(wx, 18, 8, 0, 6.28); ctx.fill(); }
  ctx.fillStyle = '#888';
  for (const wx of [-40, -10, 36]) { ctx.beginPath(); ctx.arc(wx, 18, 3.5, 0, 6.28); ctx.fill(); }
  ctx.restore();
}

function drawBed(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.fillStyle = 'rgba(40,70,110,.18)';
  ctx.beginPath(); ctx.ellipse(0, 30, 28, 8, 0, 0, 6.28); ctx.fill();
  // 床架
  ctx.fillStyle = '#8a93a6';
  roundRect(-24, -28, 48, 60, 8); ctx.fill();
  // 床墊
  ctx.fillStyle = '#e8f6f8';
  roundRect(-20, -24, 40, 52, 6); ctx.fill();
  // 棉被
  ctx.fillStyle = '#5fc8d4';
  roundRect(-20, -2, 40, 30, 6); ctx.fill();
  // 枕頭
  ctx.fillStyle = '#fff';
  roundRect(-13, -21, 26, 12, 4); ctx.fill();
  if (b.patient) {
    // 病人躺著（頭在枕頭）
    const p = b.patient;
    ctx.fillStyle = p ? '#e88a6a' : '#f2c9a0';
    ctx.beginPath(); ctx.arc(0, -14, 7, 0, 6.28); ctx.fill();
    ctx.fillStyle = '#fff';
    roundRect(-4.5, -13, 9, 5, 2); ctx.fill();
    // 治療進度
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    roundRect(-22, -40, 44, 8, 4); ctx.fill();
    ctx.fillStyle = '#7aff9d';
    if (b.progress > 0.05) { roundRect(-22, -40, 44 * Math.min(b.progress, 1), 8, 4); ctx.fill(); }
    // 治療愛心
    if (Math.sin(performance.now() / 200) > 0) {
      ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('💗', 16, -30);
    }
  }
  ctx.restore();
}

function drawScene() {
  // 雪地
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#dbe7f2');
  g.addColorStop(1, '#c4d6e8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 道路
  ctx.fillStyle = '#aebccc';
  ctx.fillRect(0, ROAD_Y - 4, W, 52);
  ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.lineWidth = 3;
  ctx.setLineDash([16, 14]);
  ctx.beginPath(); ctx.moveTo(0, ROAD_Y + 22); ctx.lineTo(W, ROAD_Y + 22); ctx.stroke();
  ctx.setLineDash([]);

  // 裝飾雪樹
  for (const [tx, ty] of [[30, 200], [30, 560], [395, 250], [395, 560], [40, 420]]) {
    ctx.fillStyle = '#2a6647';
    ctx.beginPath(); ctx.moveTo(tx - 14, ty); ctx.lineTo(tx + 14, ty); ctx.lineTo(tx, ty - 30); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(240,248,255,.9)';
    ctx.beginPath(); ctx.moveTo(tx - 9, ty - 12); ctx.lineTo(tx + 9, ty - 12); ctx.lineTo(tx, ty - 30); ctx.closePath(); ctx.fill();
  }

  // 病房地板
  ctx.fillStyle = '#b88a8a';
  roundRect(30, 286, 360, 220, 12); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.12)';
  for (let i = 0; i < 6; i++) ctx.fillRect(30, 286 + i * 38, 360, 2);
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('🏥 治療區', 40, 304);

  // 候診圍欄
  ctx.fillStyle = 'rgba(120,150,185,.18)';
  roundRect(PEN.x - 8, PEN.y - 8, PEN.w + 16, PEN.h + 16, 10); ctx.fill();
  ctx.strokeStyle = '#8a6b46'; ctx.lineWidth = 5;
  roundRect(PEN.x - 8, PEN.y - 8, PEN.w + 16, PEN.h + 16, 10); ctx.stroke();
  ctx.strokeStyle = '#a8855c'; ctx.lineWidth = 2;
  roundRect(PEN.x - 8, PEN.y - 8, PEN.w + 16, PEN.h + 16, 10); ctx.stroke();
  ctx.fillStyle = '#5a4a36';
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🤒 候診區', PEN.x + PEN.w / 2, PEN.y - 16);

  // 收銀台
  ctx.save();
  ctx.translate(DESK.x, DESK.y);
  ctx.fillStyle = 'rgba(40,70,110,.2)';
  ctx.beginPath(); ctx.ellipse(0, 16, 40, 9, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#7a5a3c';
  roundRect(-44, -10, 88, 26, 7); ctx.fill();
  ctx.fillStyle = '#94704c';
  roundRect(-44, -14, 88, 10, 5); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('💵 收費台', 0, 32);
  ctx.restore();
  // 鈔票堆
  if (bills.length > 0) {
    drawBillStack(DESK.x - 24, DESK.y - 18, bills.length, 26);
    if (bills.length > 26) {
      ctx.fillStyle = '#2a7a42';
      ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('x' + bills.length, DESK.x - 24, DESK.y - 18 - 26 * 3 - 8);
    }
  }
}

function drawPads() {
  ctx.textAlign = 'center';
  for (const pad of PADS) {
    const def = UPG[pad.key];
    const lv = state.upgLv[pad.key];
    const maxed = lv >= def.costs.length;
    const cost = maxed ? 0 : def.costs[lv];
    const paid = state.padPaid[pad.key] || 0;

    ctx.save();
    ctx.translate(pad.x, pad.y);
    ctx.fillStyle = maxed ? 'rgba(120,140,160,.35)' : 'rgba(40,120,200,.85)';
    roundRect(-44, -30, 88, 62, 12); ctx.fill();
    if (!maxed && paid > 0) {
      ctx.fillStyle = 'rgba(122,255,157,.45)';
      roundRect(-44, -30, 88 * Math.min(paid / cost, 1), 62, 12); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = 2;
    roundRect(-44, -30, 88, 62, 12); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText(def.icon, 0, -8);
    ctx.font = 'bold 12px sans-serif';
    ctx.fillText(def.label, 0, 9);
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = maxed ? '#cfd8e2' : '#ffe27a';
    ctx.fillText(maxed ? 'MAX' : '$' + Math.ceil(cost - paid), 0, 26);
    ctx.restore();
  }
  ctx.fillStyle = 'rgba(60,80,105,.8)';
  ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('站在格子上自動付費升級', W / 2, 700);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(12,24,44,.8)';
  roundRect(8, 8, W - 16, 40, 10); ctx.fill();
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = '#7aff9d';
  ctx.fillText('💵 $' + Math.floor(state.money), 20, 34);
  ctx.fillStyle = '#fff';
  ctx.fillText('✚ ' + state.cured + '/' + GOAL_CURED, 160, 34);
  ctx.fillStyle = state.frozen >= MAX_FROZEN - 3 ? '#ff8a8a' : '#aac8e2';
  ctx.fillText('🥶 ' + state.frozen + '/' + MAX_FROZEN, 280, 34);

  // 新手提示
  if (state.phase === 'play' && state.time < 50) {
    const pl = state.player;
    let hint = null, hx = 0, hy = 0;
    const queueN = state.patients.filter(p => p.state === 'queue' || p.state === 'walkToQueue').length;
    if (pl.carry.length === 0 && queueN > 0) { hint = '⬆ 去候診區接病人'; hx = PEN.x + PEN.w / 2; hy = PEN.y + PEN.h + 34; }
    else if (pl.carry.length > 0) { hint = '⬇ 放到空病床'; hx = W / 2; hy = 270; }
    else if (bills.length > 4) { hint = '💵 去收費台收錢'; hx = DESK.x; hy = DESK.y - 60; }
    if (hint) {
      const a = 0.6 + Math.sin(performance.now() / 250) * 0.3;
      ctx.fillStyle = 'rgba(20,40,70,' + a + ')';
      ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
      const tw = ctx.measureText(hint).width;
      roundRect(hx - tw / 2 - 10, hy - 18, tw + 20, 26, 8); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText(hint, hx, hy);
    }
  }

  // 搖桿
  if (joy) {
    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(joy.sx, joy.sy, 34, 0, 6.28); ctx.stroke();
    const d = Math.hypot(joy.dx, joy.dy) || 1;
    const k = Math.min(d, 32);
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.beginPath(); ctx.arc(joy.sx + joy.dx / d * k, joy.sy + joy.dy / d * k, 16, 0, 6.28); ctx.fill();
  }
}

function drawOverlay(title, lines, btnText, titleColor) {
  ctx.fillStyle = 'rgba(6,14,30,.84)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 32px sans-serif';
  ctx.fillText(title, W / 2, 240);
  ctx.fillStyle = '#dce8f5';
  ctx.font = '15px sans-serif';
  lines.forEach((l, i) => ctx.fillText(l, W / 2, 295 + i * 28));
  const pulse = 1 + Math.sin(performance.now() / 300) * .04;
  ctx.save();
  ctx.translate(W / 2, 540); ctx.scale(pulse, pulse);
  ctx.fillStyle = '#c25b1e';
  roundRect(-100, -26, 200, 52, 14); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(btnText, 0, 7);
  ctx.restore();
}

function draw() {
  drawScene();
  if (state.phase === 'play') drawPads();

  // 依 y 排序的場景物件
  const objs = [];
  for (const b of state.beds) if (b.unlocked) objs.push({ y: b.y + 30, f: () => drawBed(b) });
  if (state.truck) objs.push({ y: ROAD_Y + 20, f: () => drawTruck(state.truck) });
  for (const p of state.patients) {
    if (p.state === 'bed' || p.state === 'carried') continue;
    objs.push({ y: p.y, f: () => drawPerson(p.x, p.y, {
      sick: p.state !== 'toDesk' && p.state !== 'pay' && p.state !== 'leave',
      healed: p.state === 'toDesk' || p.state === 'pay' || p.state === 'leave',
      frozen: p.state === 'frozen', bob: p.bob,
      coat: '#a8423c'
    }) });
  }
  for (const n of state.nurses) {
    objs.push({ y: n.y, f: () => {
      drawPerson(n.x, n.y, { medic: true, bob: n.walk, walk: n.walk });
      n.carry.forEach((p, i) => drawPerson(n.x, n.y - 26 - i * 16, { sick: true, bob: p.bob }));
    } });
  }
  const pl = state.player;
  objs.push({ y: pl.y, f: () => {
    drawPerson(pl.x, pl.y, { medic: true, bob: pl.walk, walk: pl.walk });
    pl.carry.forEach((p, i) => drawPerson(pl.x, pl.y - 26 - i * 16, { sick: true, bob: p.bob }));
    // 玩家標記
    ctx.fillStyle = 'rgba(255,210,74,.95)';
    ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('▼', pl.x, pl.y - 34 - pl.carry.length * 16);
  } });
  objs.sort((a, b) => a.y - b.y);
  for (const o of objs) o.f();

  // 飛行鈔票
  for (const f of flyBills) {
    const x = f.x + (pl.x - f.x) * f.t;
    const y = f.y + (pl.y - 20 - f.y) * f.t - Math.sin(f.t * Math.PI) * 30;
    ctx.fillStyle = '#4cc96e';
    roundRect(x - 9, y - 3, 18, 6, 2); ctx.fill();
  }

  // 雪
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  for (const f of snow) { ctx.beginPath(); ctx.arc(f.x, f.y, f.s, 0, 6.28); ctx.fill(); }

  // 漂浮文字
  for (const f of floatTexts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.5));
    ctx.fillStyle = f.color;
    ctx.font = 'bold ' + f.size + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  if (state.phase === 'play') drawHUD();

  if (state.phase === 'title') {
    drawOverlay('❄️ 寒霜診所 ❄️', [
      '暴風雪中，卡車不斷送來生病的生還者。',
      '',
      '🕹️ 拖曳螢幕（或 WASD）移動醫生',
      '🤒 走進候診區自動抱起病人',
      '🛏️ 走到空病床自動放下治療',
      '💵 治癒後病人付費，走到收費台收錢',
      '🔵 站上藍色地板格購買升級',
      '',
      '治癒 ' + GOAL_CURED + ' 人獲勝；凍僵 ' + MAX_FROZEN + ' 人就失敗！'
    ], '點擊開始', '#aee2ff');
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('靈感來自《寒霜啟示錄》廣告小遊戲', W / 2, H - 26);
  } else if (state.phase === 'win') {
    drawOverlay('🏆 診所大成功！', [
      '你治癒了 ' + state.cured + ' 名生還者！',
      '',
      '💵 結餘現金：$' + Math.floor(state.money),
      '🥶 凍僵人數：' + state.frozen,
      '🛏️ 病床數：' + state.beds.filter(b => b.unlocked).length,
      '🧑‍⚕️ 護士：' + state.nurses.length + ' 名'
    ], '再玩一次', '#ffd24a');
  } else if (state.phase === 'lose') {
    drawOverlay('💀 診所倒閉了…', [
      '太多生還者在候診區凍僵了。',
      '',
      '✚ 已治癒：' + state.cured + ' 人',
      '',
      '訣竅：優先加開病床、雇護士，',
      '別讓隊伍排太長！'
    ], '重新開始', '#ff8a8a');
  }
}

// ===== 主迴圈 =====
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
