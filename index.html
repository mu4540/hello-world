<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="寒霜獵人">
<meta name="theme-color" content="#dfe9f4">
<title>寒霜獵人 ❄️ Frost Hunter 3D</title>
<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    position: fixed; inset: 0;
    background: #dfe9f4;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-text-size-adjust: none;
  }
  canvas { position: fixed; inset: 0; display: block; touch-action: none; }
  #ui { pointer-events: none; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="ui"></canvas>
<script type="module">
import * as THREE from './three.module.min.js';

// ============ 基本常數（世界座標：x 0..420，y 0..2300，北方 y 小）============
const WORLD_W = 420;
const CAMP = { top: 1750, bot: 2260, left: 40, right: 380 };
const GATE = { x0: 150, x1: 270 };
const MEAT_VAL = 3;
const PLAYER_SPEED = 165;

const BEAR_SPAWNS = [
  { x: 120, y: 1480, tier: 0 }, { x: 300, y: 1390, tier: 0 }, { x: 210, y: 1240, tier: 0 },
  { x: 95,  y: 960,  tier: 1 }, { x: 330, y: 830,  tier: 1 }, { x: 200, y: 660,  tier: 1 },
  { x: 210, y: 260,  tier: 2 }
];
const TIER = [
  { hp: 60,  dmg: 8,  speed: 85,  size: .8,  meat: 5,  aggro: 150 },
  { hp: 150, dmg: 14, speed: 72,  size: 1.15, meat: 9,  aggro: 170 },
  { hp: 700, dmg: 24, speed: 58,  size: 1.9, meat: 40, aggro: 230 }
];

function makeStations() {
  return {
    fire:    { x: 210, y: 1990, lv: 1, costs: [20, 45],           label: '營火',   icon: '🔥' },
    anvil:   { x: 96,  y: 2090, lv: 0, costs: [30, 60, 110, 180], label: '強化武器', icon: '⚒️' },
    tent:    { x: 324, y: 2090, lv: 0, costs: [25, 55, 100],      label: '帳篷',   icon: '⛺' },
    recruit: { x: 210, y: 2185, lv: 0, costs: [45, 45, 45],       label: '招募夥伴', icon: '🤝' }
  };
}

// 世界 → 3D：X = x-210（東正），Z = y（南正），高度 = Y
const wx = x => x - 210;

// ============ 狀態 ============
let state, floatTexts, particles2d;

function spawnBear(s) {
  const t = TIER[s.tier];
  return {
    x: s.x, y: s.y, hx: s.x, hy: s.y, tier: s.tier,
    vx: 0, vy: 0, kx: 0, ky: 0, heading: Math.random() * 6.28,
    hp: t.hp, maxHp: t.hp, size: t.size,
    state: 'idle', tx: s.x, ty: s.y, wanderT: 1 + Math.random() * 2,
    atkCd: 0, hitFlash: 0, walk: Math.random() * 6.28, deadT: 0, respawnT: 0
  };
}

function reset() {
  state = {
    phase: 'title', meat: 0, kills: 0, deaths: 0, time: 0,
    player: {
      x: 210, y: 2050, vx: 0, vy: 0, heading: Math.PI,
      hp: 100, walk: 0, swing: 0, atkCd: 0,
      pendingHit: null, hurtFlash: 0, deadT: 0
    },
    stations: makeStations(),
    stPaid: {},
    bears: BEAR_SPAWNS.map(spawnBear),
    meats: [],
    followers: [],
    shake: 0
  };
  floatTexts = [];
  particles2d = [];
  // 清掉動態網格
  while (dyn.children.length) dyn.remove(dyn.children[0]);
}

function playerDmg() { return 10 + state.stations.anvil.lv * 8; }
function playerMaxHp() { return 100 + state.stations.tent.lv * 40; }
function healRate() { return 6 + state.stations.fire.lv * 5; }

function addFloat(x, y, h, text, color, size) {
  floatTexts.push({ x, y, h: h + 10, text, color: color || '#fff', life: 1.1, size: size || 15 });
}
function burstAt(x, y, h, color, n, spd) {
  const p = toScreen(x, h, y);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 6.28, sp = (spd || 90) * (0.4 + Math.random());
    particles2d.push({ x: p.x, y: p.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 50, life: .35 + Math.random() * .3, color });
  }
}

// ============ 音效 ============
let audioCtx = null;
function unlockAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
function beep(freq, dur, type, vol) {
  try {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.1));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.1));
  } catch (e) {}
}

// ============ 輸入 ============
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let joy = null;
window.addEventListener('pointerdown', e => {
  e.preventDefault();
  unlockAudio();
  if (state.phase === 'title') { state.phase = 'play'; beep(880, .15, 'sine', .06); return; }
  if (state.phase === 'win') { reset(); state.phase = 'play'; return; }
  joy = { sx: e.clientX, sy: e.clientY, dx: 0, dy: 0, id: e.pointerId };
}, { passive: false });
window.addEventListener('pointermove', e => {
  if (!joy || e.pointerId !== joy.id) return;
  joy.dx = e.clientX - joy.sx; joy.dy = e.clientY - joy.sy;
});
window.addEventListener('pointerup', e => { if (joy && e.pointerId === joy.id) joy = null; });
window.addEventListener('pointercancel', () => { joy = null; });
for (const ev of ['gesturestart', 'gesturechange', 'gestureend']) {
  document.addEventListener(ev, e => e.preventDefault(), { passive: false });
}
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());

// ============ Three.js 場景 ============
const glCanvas = document.getElementById('gl');
const uiCanvas = document.getElementById('ui');
const uiCtx = uiCanvas.getContext('2d');
let renderer = null, glOK = true;
try {
  renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true });
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
} catch (e) { glOK = false; }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe2ebf5);
scene.fog = new THREE.Fog(0xe2ebf5, 850, 2100);

const camera = new THREE.PerspectiveCamera(50, 1, 10, 4000);
const CAM_OFF = new THREE.Vector3(0, 700, 520);
let camTarget = new THREE.Vector3(0, 0, 2050);

// 燈光
scene.add(new THREE.HemisphereLight(0xcfe2ff, 0xffffff, 0.95));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.5);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -460; sun.shadow.camera.right = 460;
sun.shadow.camera.top = 460; sun.shadow.camera.bottom = -460;
sun.shadow.camera.near = 10; sun.shadow.camera.far = 2200;
sun.shadow.bias = -0.002;
scene.add(sun); scene.add(sun.target);

// 材質快取
const matCache = {};
function mat(color) {
  if (!matCache[color]) matCache[color] = new THREE.MeshLambertMaterial({ color });
  return matCache[color];
}
function box(w, h, d, color) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(color));
  m.castShadow = true;
  return m;
}

// 地面（程序雪地紋理）
function snowTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#eef3f8'; g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 60; i++) {
    g.fillStyle = Math.random() < .5 ? 'rgba(255,255,255,.5)' : 'rgba(190,208,228,.35)';
    g.beginPath();
    g.ellipse(Math.random() * 256, Math.random() * 256, 8 + Math.random() * 26, 4 + Math.random() * 10, Math.random() * 3, 0, 6.28);
    g.fill();
  }
  const tx = new THREE.CanvasTexture(c);
  tx.wrapS = tx.wrapT = THREE.RepeatWrapping;
  tx.repeat.set(10, 18);
  return tx;
}
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1800, 3600),
  new THREE.MeshLambertMaterial({ map: snowTexture() })
);
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, 1150);
ground.receiveShadow = true;
scene.add(ground);

// 營地泥土地
const dirt = new THREE.Mesh(
  new THREE.PlaneGeometry(CAMP.right - CAMP.left, CAMP.bot - CAMP.top),
  mat(0xc89a66)
);
dirt.rotation.x = -Math.PI / 2;
dirt.position.set(0, 0.4, (CAMP.top + CAMP.bot) / 2);
dirt.receiveShadow = true;
scene.add(dirt);

// 柵欄（實例化木樁＋雪頂）
(function buildFence() {
  const pts = [];
  for (let x = CAMP.left; x <= GATE.x0 - 8; x += 14) pts.push([x, CAMP.top]);
  for (let x = GATE.x1 + 8; x <= CAMP.right; x += 14) pts.push([x, CAMP.top]);
  for (let y = CAMP.top + 14; y <= CAMP.bot; y += 14) { pts.push([CAMP.left, y]); pts.push([CAMP.right, y]); }
  for (let x = CAMP.left + 14; x <= CAMP.right - 14; x += 14) pts.push([x, CAMP.bot]);
  const post = new THREE.InstancedMesh(new THREE.CylinderGeometry(4, 4.5, 30, 7), mat(0xb8884e), pts.length);
  const cap = new THREE.InstancedMesh(new THREE.SphereGeometry(4.6, 8, 6), mat(0xf4f8fc), pts.length);
  post.castShadow = cap.castShadow = true;
  const m4 = new THREE.Matrix4();
  pts.forEach(([x, y], i) => {
    m4.makeTranslation(wx(x), 15 + (i % 3), y);
    post.setMatrixAt(i, m4);
    m4.makeTranslation(wx(x), 30 + (i % 3), y);
    cap.setMatrixAt(i, m4);
  });
  scene.add(post); scene.add(cap);
})();

// 紅色大門（兩片，靠近滑開）
function makeGatePanel() {
  const g = new THREE.Group();
  const frame = box(58, 36, 3, 0xe8a83c); frame.position.y = 18; g.add(frame);
  const face = box(50, 30, 3.4, 0xc23a3a); face.position.y = 18; g.add(face);
  for (const r of [0.55, -0.55]) {
    const bar = box(56, 5, 3.8, 0xe8a83c);
    bar.position.y = 18; bar.rotation.z = r; g.add(bar);
  }
  return g;
}
const gateL = makeGatePanel(), gateR = makeGatePanel();
gateL.position.set(wx(GATE.x0) + 29, 0, CAMP.top);
gateR.position.set(wx(GATE.x1) - 29, 0, CAMP.top);
scene.add(gateL); scene.add(gateR);

// ===== 建設站網格 =====
const ST = {};   // 各站動畫參照

// 營火
(function buildFire() {
  const st = makeStations().fire;
  const g = new THREE.Group();
  g.position.set(wx(st.x), 0, st.y);
  for (let i = 0; i < 4; i++) {
    const log = new THREE.Mesh(new THREE.CylinderGeometry(2.6, 2.6, 26, 6), mat(0x6b4a2a));
    log.rotation.z = Math.PI / 2; log.rotation.y = i * 0.8;
    log.position.y = 2.6; log.castShadow = true;
    g.add(log);
  }
  const flames = [];
  const fc = [[0xff5c2a, 11, 22], [0xff9d3c, 7.5, 16], [0xffd24a, 4.5, 10]];
  for (const [c, r, h] of fc) {
    const f = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), new THREE.MeshBasicMaterial({ color: c }));
    f.position.y = 4 + h / 2;
    g.add(f); flames.push(f);
  }
  const light = new THREE.PointLight(0xff9d3c, 1.6, 320, 1.4);
  light.position.y = 26;
  g.add(light);
  scene.add(g);
  ST.flames = flames; ST.fireLight = light;
})();

// 鐵砧＋發光磚
(function buildAnvil() {
  const st = makeStations().anvil;
  const g = new THREE.Group();
  g.position.set(wx(st.x), 0, st.y);
  const base = box(16, 10, 12, 0x55606c); base.position.y = 5; g.add(base);
  const top = box(30, 8, 14, 0x7a8694); top.position.y = 14; g.add(top);
  const bricks = [];
  for (let i = 0; i < 4; i++) {
    const b = new THREE.Mesh(new THREE.BoxGeometry(14, 5, 8),
      new THREE.MeshLambertMaterial({ color: 0xe89a3c, emissive: 0xa05a10, emissiveIntensity: .7 }));
    b.position.set(-26 + (i % 2) * 16, 2.5 + Math.floor(i / 2) * 6, -14);
    b.castShadow = true; b.visible = false;
    g.add(b); bricks.push(b);
  }
  scene.add(g);
  ST.bricks = bricks;
})();

// 帳篷
(function buildTent() {
  const st = makeStations().tent;
  const tent = new THREE.Mesh(new THREE.ConeGeometry(26, 34, 4), mat(0x3a78c2));
  tent.rotation.y = Math.PI / 4;
  tent.position.set(wx(st.x), 17, st.y);
  tent.castShadow = true;
  scene.add(tent);
  const snowTop = new THREE.Mesh(new THREE.ConeGeometry(10, 13, 4), mat(0xf4f8fc));
  snowTop.rotation.y = Math.PI / 4;
  snowTop.position.set(wx(st.x), 38, st.y);
  scene.add(snowTop);
  ST.tent = tent; ST.tentSnow = snowTop;
})();

// 招募長椅
(function buildBench() {
  const st = makeStations().recruit;
  const g = new THREE.Group();
  g.position.set(wx(st.x), 0, st.y);
  const seat = box(46, 4, 14, 0xb8884e); seat.position.y = 10; g.add(seat);
  for (const sx of [-18, 18]) { const leg = box(5, 10, 12, 0x96693a); leg.position.set(sx, 5, 0); g.add(leg); }
  const snowS = box(46, 2, 14, 0xf4f8fc); snowS.position.y = 13; g.add(snowS);
  scene.add(g);
})();

// 升級圈（白色圓環）
const ringGeo = new THREE.RingGeometry(36, 43, 42);
const rings = {};
for (const [key, st] of Object.entries(makeStations())) {
  const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: .85, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(wx(st.x), 0.8, st.y);
  scene.add(ring);
  rings[key] = ring;
}

// 魔王巢穴冰刺
for (let i = 0; i < 10; i++) {
  const a = i / 10 * 6.28;
  const spike = new THREE.Mesh(new THREE.ConeGeometry(8, 30 + (i % 3) * 12, 6),
    new THREE.MeshLambertMaterial({ color: 0xb8e2f8, emissive: 0x2a6a8a, emissiveIntensity: .25 }));
  spike.position.set(Math.cos(a) * 95, 15 + (i % 3) * 6, 260 + Math.sin(a) * 70);
  spike.rotation.z = (Math.random() - .5) * .3;
  spike.castShadow = true;
  scene.add(spike);
}

// 裝飾：松樹 / 枯樹 / 岩石
function makePine(s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2.5 * s, 3 * s, 12 * s, 6), mat(0x6b4a2a));
  trunk.position.y = 6 * s; trunk.castShadow = true; g.add(trunk);
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(16 * s, 26 * s, 7), mat(0x2a6647));
  c1.position.y = 22 * s; c1.castShadow = true; g.add(c1);
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(11 * s, 20 * s, 7), mat(0x35775a));
  c2.position.y = 36 * s; c2.castShadow = true; g.add(c2);
  const snowC = new THREE.Mesh(new THREE.ConeGeometry(7 * s, 12 * s, 7), mat(0xf4f8fc));
  snowC.position.y = 46 * s; g.add(snowC);
  return g;
}
function makeDeadTree(s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2 * s, 3.4 * s, 52 * s, 6), mat(0x8a5a3c));
  trunk.position.y = 26 * s; trunk.castShadow = true; g.add(trunk);
  for (let i = 0; i < 4; i++) {
    const br = new THREE.Mesh(new THREE.CylinderGeometry(1 * s, 1.6 * s, 20 * s, 5), mat(0x8a5a3c));
    br.position.y = (16 + i * 9) * s;
    br.rotation.z = (i % 2 ? 1 : -1) * 1.0;
    br.position.x = (i % 2 ? 1 : -1) * 8 * s;
    br.castShadow = true;
    g.add(br);
  }
  return g;
}
function makeRock(s) {
  const r = new THREE.Mesh(new THREE.DodecahedronGeometry(9 * s, 0), mat(0x9aa6b4));
  r.position.y = 4 * s;
  r.scale.y = 0.7;
  r.castShadow = true;
  return r;
}
(function buildDecor() {
  for (let i = 0; i < 30; i++) {
    const y = 80 + Math.random() * 1560;
    const x = 20 + Math.random() * (WORLD_W - 40);
    if (Math.hypot(x - 210, y - 260) < 160) continue;
    const s = .7 + Math.random() * .7;
    const r = Math.random();
    const m = r < .4 ? makePine(s) : (r < .75 ? makeDeadTree(s) : makeRock(s));
    m.position.set(wx(x), 0, y);
    m.rotation.y = Math.random() * 6.28;
    scene.add(m);
  }
})();

// ===== 角色 / 野獸工廠 =====
function makePerson(coat, withClub) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(5.5, 9, 4, 10), mat(coat));
  body.position.y = 13; body.castShadow = true; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(5.5, 12, 10), mat(0xf2c9a0));
  head.position.y = 26; head.castShadow = true; g.add(head);
  const hat = new THREE.Mesh(new THREE.SphereGeometry(5.9, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2.1), mat(coat));
  hat.position.y = 27; g.add(hat);
  const arms = {};
  for (const side of [-1, 1]) {
    const pivot = new THREE.Group();
    pivot.position.set(side * 7, 21, 0);
    const arm = new THREE.Mesh(new THREE.CapsuleGeometry(2.2, 8, 4, 8), mat(coat));
    arm.position.y = -5; arm.castShadow = true;
    pivot.add(arm);
    g.add(pivot);
    arms[side] = pivot;
  }
  if (withClub) {
    // 紅色螺旋大棒（廣告同款）
    const club = new THREE.Group();
    for (let i = 0; i < 5; i++) {
      const seg = new THREE.Mesh(new THREE.CylinderGeometry(2.6 + i * 0.28, 2.6 + (i + 1) * 0.28, 4.6, 8),
        mat(i % 2 ? 0x8a1f28 : 0xb8333c));
      seg.position.y = -(11 + i * 4.4);
      seg.castShadow = true;
      club.add(seg);
    }
    arms[1].add(club);
  }
  g.userData = { armL: arms[-1], armR: arms[1] };
  return g;
}

function makeBear(s) {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0xf4f6f0 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(12, 14, 12), bodyMat);
  body.scale.set(1.35, 1.05, 1.8);
  body.position.y = 16; body.castShadow = true; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(7.5, 12, 10), bodyMat);
  head.position.set(0, 19, 20); head.castShadow = true; g.add(head);
  const snout = new THREE.Mesh(new THREE.SphereGeometry(3.6, 8, 8), bodyMat);
  snout.position.set(0, 17, 26.5); g.add(snout);
  const dark = mat(0x2a2e34);
  const nose = new THREE.Mesh(new THREE.SphereGeometry(1.7, 8, 6), dark);
  nose.position.set(0, 17.6, 29.5); g.add(nose);
  for (const sx of [-3.6, 3.6]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(1.2, 6, 6), dark);
    eye.position.set(sx, 21, 26); g.add(eye);
  }
  for (const sx of [-5, 5]) {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(2.6, 8, 6), bodyMat);
    ear.position.set(sx, 25.5, 17); g.add(ear);
  }
  const legs = [];
  for (const [lx, lz] of [[-9, 10], [9, 10], [-9, -10], [9, -10]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 3.8, 12, 7), bodyMat);
    leg.position.set(lx, 6, lz); leg.castShadow = true;
    g.add(leg); legs.push(leg);
  }
  g.scale.setScalar(s);
  g.userData = { legs, flashMat: bodyMat };
  return g;
}

function makeMeatMesh() {
  const g = new THREE.Group();
  const m = new THREE.Mesh(new THREE.SphereGeometry(5, 8, 7), mat(0xd4504a));
  m.scale.set(1.3, 0.75, 1);
  m.castShadow = true; g.add(m);
  const fat = new THREE.Mesh(new THREE.SphereGeometry(2.6, 7, 6), mat(0xf0b8b2));
  fat.position.set(2, 2.2, 0); g.add(fat);

  bone.rotation.z = Math.PI / 2; bone.position.set(-6, 0, 0); g.add(bone);
  return g;
}

// ============ 柵欄碰撞 ============
function clampToWalls(o, r) {
  if (o.y > CAMP.top - r && o.y < CAMP.top + r && (o.x < GATE.x0 + r || o.x > GATE.x1 - r)) {
    o.y = o.y < CAMP.top ? CAMP.top - r : CAMP.top + r;
  }
  if (o.y > CAMP.top) {
    if (o.x < CAMP.left + r) o.x = CAMP.left + r;
    if (o.x > CAMP.right - r) o.x = CAMP.right - r;
    if (o.y > CAMP.bot - r) o.y = CAMP.bot - r;
  }
  o.x = Math.max(14, Math.min(WORLD_W - 14, o.x));
  o.y = Math.max(60, Math.min(2280, o.y));
}

// 角度平滑（最短弧）
function lerpAngle(a, b, t) {
  const d = ((b - a + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
  return a + d * Math.min(1, t);
}

// ============ 遊戲邏輯 ============
function update(dt) {
  if (state.phase !== 'play') return;
  state.time += dt;
  const pl = state.player;

  // --- 被擊倒 ---
  if (pl.deadT > 0) {
    pl.deadT -= dt;
    pl.vx = pl.vy = 0;
    if (pl.deadT <= 0) {
      pl.x = 210; pl.y = 2050; pl.hp = playerMaxHp();
      addFloat(pl.x, pl.y, 40, '在營火旁甦醒', '#aee2ff');
    }
  } else {
    // --- 平滑移動（速度緩動 + 類比搖桿強度）---
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (joy) {
      const d = Math.hypot(joy.dx, joy.dy);
      if (d > 6) {
        const k = Math.min(1, d / 60);
        mx = joy.dx / d * k; my = joy.dy / d * k;
      }
    }
    const ml = Math.hypot(mx, my);
    if (ml > 1) { mx /= ml; my /= ml; }
    const ease = 1 - Math.exp(-11 * dt);
    pl.vx += (mx * PLAYER_SPEED - pl.vx) * ease;
    pl.vy += (my * PLAYER_SPEED - pl.vy) * ease;
    pl.x += pl.vx * dt;
    pl.y += pl.vy * dt;
    clampToWalls(pl, 12);
    const spd = Math.hypot(pl.vx, pl.vy);
    if (spd > 15) {
      pl.walk += spd * dt * 0.075;
      pl.heading = lerpAngle(pl.heading, Math.atan2(pl.vx, pl.vy), 14 * dt);
    }

    // --- 自動攻擊（揮擊動畫 + 衝步 + 延遲命中）---
    pl.atkCd -= dt;
    if (pl.swing > 0) pl.swing = Math.max(0, pl.swing - dt / 0.3);
    let target = null, td = 1e9;
    for (const b of state.bears) {
      if (b.state === 'dead') continue;
      const d = Math.hypot(b.x - pl.x, b.y - pl.y) - b.size * 22;
      if (d < td) { td = d; target = b; }
    }
    if (target && td < 58 && pl.atkCd <= 0) {
      pl.atkCd = 0.42;
      pl.swing = 1;
      const dx = target.x - pl.x, dy = target.y - pl.y, d = Math.hypot(dx, dy) || 1;
      pl.heading = Math.atan2(dx, dy);
      pl.vx += dx / d * 110;   // 小衝步
      pl.vy += dy / d * 110;
      pl.pendingHit = { b: target, t: 0.1 };
      beep(420, .05, 'triangle', .04);
    }
    if (pl.pendingHit) {
      pl.pendingHit.t -= dt;
      if (pl.pendingHit.t <= 0) {
        const b = pl.pendingHit.b;
        pl.pendingHit = null;
        if (b.state !== 'dead' && Math.hypot(b.x - pl.x, b.y - pl.y) < b.size * 22 + 85) {
          hitBear(b, playerDmg(), pl);
        }
      }
    }

    // --- 營火回血 ---
    const fire = state.stations.fire;
    if (Math.hypot(pl.x - fire.x, pl.y - fire.y) < 95 && pl.hp < playerMaxHp()) {
      pl.hp = Math.min(playerMaxHp(), pl.hp + healRate() * dt);
    }
  }
  pl.hurtFlash -= dt;

  // --- 野獸 AI（速度平滑 + 擊退衰減）---
  for (const b of state.bears) {
    if (b.state === 'dead') {
      b.deadT += dt;
      if (b.tier < 2) {
        b.respawnT -= dt;
        if (b.respawnT <= 0) {
          const mesh = b.mesh;
          Object.assign(b, spawnBear({ x: b.hx, y: b.hy, tier: b.tier }));
          b.mesh = mesh;
          if (mesh) { mesh.visible = true; mesh.rotation.z = 0; }
        }
      }
      continue;
    }
    b.atkCd -= dt; b.hitFlash -= dt;
    const t = TIER[b.tier];
    const dp = Math.hypot(pl.x - b.x, pl.y - b.y);
    const range = 30 + b.size * 24;
    let dvx = 0, dvy = 0;

    if (b.state === 'idle') {
      if (dp < t.aggro && pl.deadT <= 0 && pl.y < CAMP.top) { b.state = 'chase'; addFloat(b.x, b.y, 52 * b.size, '❗', '#ff8a8a', 18); }
      else {
        b.wanderT -= dt;
        if (b.wanderT <= 0) {
          b.wanderT = 1.5 + Math.random() * 2.5;
          b.tx = b.hx + (Math.random() - .5) * 110;
          b.ty = b.hy + (Math.random() - .5) * 110;
        }
        const dx = b.tx - b.x, dy = b.ty - b.y, d = Math.hypot(dx, dy);
        if (d > 8) { dvx = dx / d * t.speed * .4; dvy = dy / d * t.speed * .4; }
      }
    } else if (b.state === 'chase') {
      if (dp > t.aggro + 180 || pl.deadT > 0 || pl.y > CAMP.top) b.state = 'return';
      else if (dp > range) {
        dvx = (pl.x - b.x) / dp * t.speed;
        dvy = (pl.y - b.y) / dp * t.speed;
      }
      if (dp < range + 8 && b.atkCd <= 0 && pl.deadT <= 0) {
        b.atkCd = 1.05;
        pl.hp -= t.dmg;
        pl.hurtFlash = 0.3;
        state.shake = 0.22;
        const nx = (pl.x - b.x) / (dp || 1), ny = (pl.y - b.y) / (dp || 1);
        pl.vx += nx * 150; pl.vy += ny * 150;   // 玩家被擊退
        burstAt(pl.x, pl.y, 26, '#ff6a5a', 8);
        addFloat(pl.x, pl.y, 38, '-' + t.dmg, '#ff8a8a', 15);
        beep(170, .12, 'sawtooth', .06);
        if (pl.hp <= 0) playerDown();
      }
    } else if (b.state === 'return') {
      const dx = b.hx - b.x, dy = b.hy - b.y, d = Math.hypot(dx, dy);
      b.hp = Math.min(b.maxHp, b.hp + b.maxHp * 0.06 * dt);
      if (d < 10) b.state = 'idle';
      else { dvx = dx / d * t.speed * .8; dvy = dy / d * t.speed * .8; }
      if (dp < t.aggro * .8 && pl.deadT <= 0 && pl.y < CAMP.top) b.state = 'chase';
    }

    const bease = 1 - Math.exp(-6 * dt);
    b.vx += (dvx - b.vx) * bease;
    b.vy += (dvy - b.vy) * bease;
    b.x += (b.vx + b.kx) * dt;
    b.y += (b.vy + b.ky) * dt;
    const kd = Math.exp(-7 * dt);
    b.kx *= kd; b.ky *= kd;
    if (b.y > CAMP.top - 28) b.y = CAMP.top - 28;   // 進不了營地
    const bspd = Math.hypot(b.vx, b.vy);
    if (bspd > 10) {
      b.walk += bspd * dt * 0.09;
      b.heading = lerpAngle(b.heading, Math.atan2(b.vx, b.vy), 8 * dt);
    }
  }

  // --- 夥伴 AI ---
  for (let i = 0; i < state.followers.length; i++) {
    const f = state.followers[i];
    f.atkCd -= dt;
    if (f.swing > 0) f.swing = Math.max(0, f.swing - dt / 0.3);
    let tg = null, tdd = 1e9;
    for (const b of state.bears) {
      if (b.state === 'dead') continue;
      const d = Math.hypot(b.x - f.x, b.y - f.y);
      if (d < 160 && d < tdd) { tdd = d; tg = b; }
    }
    let tx, ty;
    if (tg) {
      const range = 26 + tg.size * 24;
      if (tdd > range) { tx = tg.x; ty = tg.y; }
      else {
        tx = f.x; ty = f.y;
        if (f.atkCd <= 0) {
          f.atkCd = 0.75; f.swing = 1;
          f.heading = Math.atan2(tg.x - f.x, tg.y - f.y);
          hitBear(tg, 5 + state.stations.anvil.lv * 4, f);
        }
      }
    } else {
      const lead = i === 0 ? pl : state.followers[i - 1];
      tx = lead.x - Math.sin(i * 2.1) * 28; ty = lead.y + 26 + i * 4;
    }
    const dx = tx - f.x, dy = ty - f.y, d = Math.hypot(dx, dy);
    const want = d > 26;
    const fease = 1 - Math.exp(-9 * dt);
    f.vx += ((want ? dx / d * 150 : 0) - f.vx) * fease;
    f.vy += ((want ? dy / d * 150 : 0) - f.vy) * fease;
    f.x += f.vx * dt; f.y += f.vy * dt;
    const fspd = Math.hypot(f.vx, f.vy);
    if (fspd > 15) {
      f.walk += fspd * dt * 0.075;
      f.heading = lerpAngle(f.heading, Math.atan2(f.vx, f.vy), 12 * dt);
    }
  }

  // --- 肉塊（拋物落地 → 吸附飛向玩家）---
  for (const m of state.meats) {
    if (!m.fly) {
      m.x += m.vx * dt; m.y += m.vy * dt;
      m.vx *= Math.exp(-2.5 * dt); m.vy *= Math.exp(-2.5 * dt);
      m.vh -= 420 * dt;
      m.h += m.vh * dt;
      if (m.h <= 0) { m.h = 0; m.vh = -m.vh * 0.35; if (Math.abs(m.vh) < 30) m.vh = 0; }
      if (pl.deadT <= 0 && Math.hypot(pl.x - m.x, pl.y - m.y) < 58) {
        m.fly = true; m.t = 0; m.fx0 = m.x; m.fy0 = m.y; m.fh0 = m.h;
      }
    } else {
      m.t += dt * 3.6;
      if (m.t >= 1) { m.done = true; state.meat += MEAT_VAL; beep(980 + Math.random() * 250, .05, 'sine', .04); }
      else {
        m.x = m.fx0 + (pl.x - m.fx0) * m.t;
        m.y = m.fy0 + (pl.y - m.fy0) * m.t;
        m.h = m.fh0 + (24 - m.fh0) * m.t + Math.sin(m.t * Math.PI) * 18;
      }
    }
  }
  for (const m of state.meats) {
    if (m.done && m.mesh) { dyn.remove(m.mesh); m.mesh = null; }
  }
  state.meats = state.meats.filter(m => !m.done);

  // --- 建設站 ---
  for (const key in state.stations) {
    const st = state.stations[key];
    if (st.lv >= st.costs.length) continue;
    if (pl.deadT <= 0 && Math.hypot(pl.x - st.x, pl.y - st.y) < 52 && state.meat > 0) {
      const cost = st.costs[st.lv];
      const paid = state.stPaid[key] || 0;
      const pay = Math.min(state.meat, 26 * dt, cost - paid);
      if (pay > 0) {
        state.meat -= pay;
        state.stPaid[key] = paid + pay;
        if (state.stPaid[key] >= cost - 0.01) {
          state.stPaid[key] = 0;
          st.lv++;
          applyStation(key);
        }
      }
    }
  }

  if (state.shake > 0) state.shake -= dt;

  for (let i = particles2d.length - 1; i >= 0; i--) {
    const p = particles2d[i];
    p.life -= dt;
    if (p.life <= 0) { particles2d.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 280 * dt;
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= dt * 0.85; f.h += 26 * dt;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }
}

function hitBear(b, dmg, from) {
  b.hp -= dmg;
  b.hitFlash = 0.18;
  if (b.state === 'idle' || b.state === 'return') b.state = 'chase';
  const d = Math.hypot(b.x - from.x, b.y - from.y) || 1;
  b.kx += (b.x - from.x) / d * 170 / b.size;
  b.ky += (b.y - from.y) / d * 170 / b.size;
  burstAt(b.x, b.y, 24 * b.size, '#ffd24a', 7);
  addFloat(b.x, b.y, 46 * b.size, '-' + dmg, '#ffd24a', 15);
  beep(260 + Math.random() * 60, .06, 'square', .05);
  if (b.hp <= 0) {
    b.state = 'dead'; b.deadT = 0; b.respawnT = 26;
    state.kills++;
    const t = TIER[b.tier];
    for (let i = 0; i < t.meat; i++) {
      const a = Math.random() * 6.28;
      state.meats.push({
        x: b.x, y: b.y, h: 20, vx: Math.cos(a) * (40 + Math.random() * 90), vy: Math.sin(a) * (40 + Math.random() * 90),
        vh: 120 + Math.random() * 120, fly: false, t: 0
      });
    }
    burstAt(b.x, b.y, 20 * b.size, '#ffffff', 16, 130);
    beep(140, .25, 'sawtooth', .06);
    if (b.tier === 2) {
      state.phase = 'win';
      beep(660, .2, 'sine', .08); beep(880, .25, 'sine', .08); beep(1100, .4, 'sine', .08);
    } else {
      addFloat(b.x, b.y, 40, '🥩 獵物倒下！', '#ffb14a', 17);
    }
  }
}

function playerDown() {
  const pl = state.player;
  pl.hp = 0;
  pl.deadT = 2.2;
  state.deaths++;
  const drop = Math.floor(state.meat * 0.3 / MEAT_VAL);
  state.meat -= drop * MEAT_VAL;
  for (let i = 0; i < Math.min(drop, 20); i++) {
    const a = Math.random() * 6.28;
    state.meats.push({ x: pl.x, y: pl.y, h: 16, vx: Math.cos(a) * 130, vy: Math.sin(a) * 130, vh: 140, fly: false, t: 0 });
  }
  addFloat(pl.x, pl.y, 40, '💫 你被擊倒了！', '#ff8a8a', 18);
  beep(120, .5, 'sawtooth', .07);
}

function applyStation(key) {
  const st = state.stations[key];
  if (key === 'fire') addFloat(st.x, st.y, 40, '🔥 營火更旺，回血加快！', '#ffb14a', 16);
  else if (key === 'anvil') {
    addFloat(st.x, st.y, 40, '⚒️ 武器強化！攻擊 ' + playerDmg(), '#ffd24a', 16);
    burstAt(st.x, st.y, 20, '#ffd24a', 14);
  } else if (key === 'tent') {
    state.player.hp = playerMaxHp();
    addFloat(st.x, st.y, 50, '⛺ 生命上限 ' + playerMaxHp() + '！', '#7aff9d', 16);
  } else if (key === 'recruit') {
    state.followers.push({ x: st.x, y: st.y + 24, vx: 0, vy: 0, heading: 0, walk: 0, atkCd: 0, swing: 0 });
    addFloat(st.x, st.y, 40, '🤝 夥伴加入狩獵！', '#7ad4ff', 16);
  }
  beep(660, .1, 'sine', .06); beep(990, .18, 'sine', .06);
}

// ============ 圖形同步 ============
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function ensurePerson(ent, coat) {
  if (!ent.mesh) { ent.mesh = makePerson(coat, true); dyn.add(ent.mesh); }
  return ent.mesh;
}

function animatePerson(mesh, ent) {
  mesh.position.set(wx(ent.x), Math.abs(Math.sin(ent.walk)) * 1.6, ent.y);
  mesh.rotation.y = ent.heading;
  const u = mesh.userData;
  const sw = ent.swing || 0;
  if (sw > 0) {
    // 揮擊：高舉 → 快速劈下
    const p = 1 - sw;
    u.armR.rotation.x = -2.5 + 3.2 * easeOutCubic(Math.min(1, p / 0.55));
    u.armL.rotation.x = 0.4;
  } else {
    u.armR.rotation.x = -0.45 + Math.sin(ent.walk) * 0.55;
    u.armL.rotation.x = -0.45 - Math.sin(ent.walk) * 0.55;
  }
}

function syncGraphics(dt, t) {
  const pl = state.player;

  // 玩家
  const pm = ensurePerson(pl, 0x4a90d4);
  pm.visible = pl.deadT <= 0;
  animatePerson(pm, pl);

  // 夥伴
  for (const f of state.followers) {
    const fm = ensurePerson(f, 0x5aa8d4);
    animatePerson(fm, f);
  }

  // 野獸
  for (const b of state.bears) {
    if (!b.mesh) { b.mesh = makeBear(b.size); dyn.add(b.mesh); }
    const m = b.mesh;
    if (b.state === 'dead') {
      m.rotation.z = Math.min(b.deadT * 2.4, 1.45);
      m.position.set(wx(b.x), b.deadT > 0.9 ? -(b.deadT - 0.9) * 28 : 0, b.y);
      if (b.deadT > 2.2) m.visible = false;
    } else {
      m.visible = true;
      m.position.set(wx(b.x), Math.abs(Math.sin(b.walk)) * 1.6 * b.size, b.y);
      m.rotation.y = b.heading;
      m.rotation.z = 0;
      const legs = m.userData.legs;
      for (let i = 0; i < 4; i++) legs[i].rotation.x = Math.sin(b.walk + (i % 2) * Math.PI) * 0.55;
      m.userData.flashMat.emissive.setHex(b.hitFlash > 0 ? 0xc23a3a : 0x000000);
    }
  }

  // 肉塊
  for (const m of state.meats) {
    if (!m.mesh) { m.mesh = makeMeatMesh(); dyn.add(m.mesh); }
    m.mesh.position.set(wx(m.x), 3 + m.h, m.y);
    m.mesh.rotation.y += dt * 2.5;
  }

  // 營火
  const flv = state.stations.fire.lv;
  const flick = 1 + Math.sin(t * 11) * .1 + Math.sin(t * 23.7) * .06;
  ST.flames.forEach((f, i) => {
    const s = (0.8 + flv * 0.25) * flick * (1 - i * 0.06);
    f.scale.set(s, s * (1 + Math.sin(t * 9 + i) * .12), s);
  });
  ST.fireLight.intensity = (1.2 + flv * 0.5) * flick;

  // 鐵砧磚 / 帳篷
  ST.bricks.forEach((b, i) => { b.visible = i < state.stations.anvil.lv; });
  const ts = 1 + state.stations.tent.lv * 0.12;
  ST.tent.scale.setScalar(ts);
  ST.tentSnow.position.y = 38 * ts;

  // 升級圈
  for (const key in rings) {
    const st = state.stations[key];
    const ring = rings[key];
    const maxed = st.lv >= st.costs.length;
    ring.visible = !maxed && state.phase === 'play';
    if (ring.visible) {
      const paid = (state.stPaid[key] || 0) / st.costs[st.lv];
      ring.scale.setScalar(1 + Math.sin(t * 4) * 0.05);
      ring.material.color.setHex(paid > 0 ? 0x7aff9d : 0xffffff);
    }
  }

  // 大門滑開
  const gateNear = pl.deadT <= 0 && Math.hypot(pl.x - 210, pl.y - CAMP.top) < 110;
  const glX = wx(GATE.x0) + 29 - (gateNear ? 50 : 0);
  const grX = wx(GATE.x1) - 29 + (gateNear ? 50 : 0);
  gateL.position.x += (glX - gateL.position.x) * Math.min(1, dt * 7);
  gateR.position.x += (grX - gateR.position.x) * Math.min(1, dt * 7);

  // 等待生還者擺動
  waiters.forEach((m, i) => {
    m.position.y = Math.abs(Math.sin(t * 2 + i * 1.7)) * 1.2;
    m.userData.armR.rotation.x = Math.sin(t * 2 + i) * 0.2 - 0.4;
    m.userData.armL.rotation.x = -Math.sin(t * 2 + i) * 0.2 - 0.4;
  });

  // 雪花
  const pos = snowGeo.attributes.position.array;
  for (let i = 0; i < SNOW_N; i++) {
    pos[i * 3 + 1] -= snowVel[i] * dt;
    pos[i * 3] += Math.sin(t + i) * 6 * dt;
    if (pos[i * 3 + 1] < 0) {
      pos[i * 3 + 1] = 420 + Math.random() * 80;
      pos[i * 3] = -300 + Math.random() * 600;
      pos[i * 3 + 2] = camTarget.z - 900 + Math.random() * 1500;
    }
  }
  snowGeo.attributes.position.needsUpdate = true;

  // 鏡頭平滑跟隨 + 受擊震動
  camTarget.x += (wx(pl.x) * 0.55 - camTarget.x) * Math.min(1, dt * 5);
  camTarget.z += (pl.y - camTarget.z) * Math.min(1, dt * 5);
  const shx = state.shake > 0 ? (Math.random() - .5) * 10 : 0;
  const shy = state.shake > 0 ? (Math.random() - .5) * 10 : 0;
  camera.position.set(camTarget.x + CAM_OFF.x + shx, CAM_OFF.y, camTarget.z + CAM_OFF.z);
  camera.lookAt(camTarget.x + shx, shy, camTarget.z - 100);

  // 太陽跟著鏡頭（陰影範圍）
  sun.position.set(camTarget.x + 260, 620, camTarget.z + 160);
  sun.target.position.set(camTarget.x, 0, camTarget.z);
}

// ============ UI 繪製 ============
function rr(x, y, w, h, r) {
  uiCtx.beginPath();
  uiCtx.moveTo(x + r, y);
  uiCtx.arcTo(x + w, y, x + w, y + h, r);
  uiCtx.arcTo(x + w, y + h, x, y + h, r);
  uiCtx.arcTo(x, y + h, x, y, r);
  uiCtx.arcTo(x, y, x + w, y, r);
  uiCtx.closePath();
}

function drawUI(t) {
  uiCtx.clearRect(0, 0, uiW, uiH);
  const pl = state.player;
  const k = Math.max(0.85, Math.min(1.3, uiW / 420));

  if (!glOK) {
    uiCtx.fillStyle = '#0a1428'; uiCtx.fillRect(0, 0, uiW, uiH);
    uiCtx.fillStyle = '#fff'; uiCtx.font = '16px sans-serif'; uiCtx.textAlign = 'center';
    uiCtx.fillText('此瀏覽器不支援 WebGL，無法執行 3D 遊戲', uiW / 2, uiH / 2);
    return;
  }

  if (state.phase === 'play') {
    // 野獸血條
    for (const b of state.bears) {
      if (b.state === 'dead' || b.hp >= b.maxHp || b.tier === 2) continue;
      const p = toScreen(b.x, 52 * b.size, b.y);
      if (p.behind) continue;
      const bw = 56 * k * b.size;
      uiCtx.fillStyle = 'rgba(0,0,0,.45)';
      rr(p.x - bw / 2, p.y, bw, 6 * k, 3 * k); uiCtx.fill();
      uiCtx.fillStyle = '#ff5a5a';
      const r = Math.max(0, b.hp / b.maxHp);
      if (r > .04) { rr(p.x - bw / 2, p.y, bw * r, 6 * k, 3 * k); uiCtx.fill(); }
    }
    // 玩家血條
    if (pl.deadT <= 0) {
      const p = toScreen(pl.x, 44, pl.y);
      const bw = 56 * k;
      uiCtx.fillStyle = 'rgba(0,0,0,.45)';
      rr(p.x - bw / 2, p.y, bw, 7 * k, 3.5 * k); uiCtx.fill();
      uiCtx.fillStyle = '#5fe07a';
      const r = Math.max(0, pl.hp / playerMaxHp());
      if (r > .04) { rr(p.x - bw / 2, p.y, bw * r, 7 * k, 3.5 * k); uiCtx.fill(); }
    }

    // 建設站標價
    for (const key in state.stations) {
      const st = state.stations[key];
      if (st.lv >= st.costs.length) continue;
      const p = toScreen(st.x, 0, st.y + 52);
      if (p.behind) continue;
      const cost = st.costs[st.lv];
      const paid = state.stPaid[key] || 0;
      const txt = st.icon + ' ' + st.label + '  🥩' + Math.ceil(cost - paid);
      uiCtx.font = 'bold ' + (12 * k) + 'px sans-serif';
      const tw = uiCtx.measureText(txt).width;
      uiCtx.fillStyle = 'rgba(12,24,44,.85)';
      rr(p.x - tw / 2 - 10, p.y - 13 * k, tw + 20, 24 * k, 9 * k); uiCtx.fill();
      if (paid > 0) {
        uiCtx.fillStyle = 'rgba(122,255,157,.35)';
        rr(p.x - tw / 2 - 10, p.y - 13 * k, (tw + 20) * (paid / cost), 24 * k, 9 * k); uiCtx.fill();
      }
      uiCtx.fillStyle = '#fff'; uiCtx.textAlign = 'center';
      uiCtx.fillText(txt, p.x, p.y + 4 * k);
    }

    // 魔王血條
    const boss = state.bears.find(b => b.tier === 2);
    if (boss && boss.state !== 'dead' && pl.y < 760) {
      const bx = uiW / 2, by = 56 + safeTop;
      uiCtx.fillStyle = 'rgba(12,24,44,.82)';
      rr(bx - 160 * k, by, 320 * k, 34 * k, 10 * k); uiCtx.fill();
      uiCtx.fillStyle = '#fff';
      uiCtx.font = 'bold ' + (12 * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.fillText('❄️ 冰原巨獸', bx, by + 14 * k);
      uiCtx.fillStyle = 'rgba(255,255,255,.18)';
      rr(bx - 150 * k, by + 20 * k, 300 * k, 8 * k, 4 * k); uiCtx.fill();
      uiCtx.fillStyle = '#ff4a4a';
      const r = Math.max(0, boss.hp / boss.maxHp);
      if (r > .02) { rr(bx - 150 * k, by + 20 * k, 300 * k * r, 8 * k, 4 * k); uiCtx.fill(); }
    }

    // HUD：🥩 與目標
    const hudY = 12 + safeTop;
    uiCtx.fillStyle = 'rgba(12,24,44,.82)';
    rr(uiW - 124 * k - 12, hudY, 124 * k, 36 * k, 18 * k); uiCtx.fill();
    uiCtx.font = 'bold ' + (17 * k) + 'px sans-serif'; uiCtx.textAlign = 'left';
    uiCtx.fillStyle = '#fff';
    uiCtx.fillText('🥩', uiW - 114 * k - 12, hudY + 25 * k);
    uiCtx.fillStyle = '#ffd2a0';
    uiCtx.fillText(String(Math.floor(state.meat)), uiW - 86 * k - 12, hudY + 25 * k);

    uiCtx.fillStyle = 'rgba(12,24,44,.7)';
    rr(12, hudY, 178 * k, 36 * k, 10 * k); uiCtx.fill();
    uiCtx.fillStyle = '#aee2ff';
    uiCtx.font = 'bold ' + (12 * k) + 'px sans-serif';
    uiCtx.fillText('目標：擊敗北方的冰原巨獸', 22, hudY + 23 * k);

    // 目標箭頭
    let gx = null, gy = null, cheapest = null;
    for (const key in state.stations) {
      const st = state.stations[key];
      if (st.lv >= st.costs.length) continue;
      const c = st.costs[st.lv] - (state.stPaid[key] || 0);
      if (state.meat >= c && (!cheapest || c < cheapest.c)) cheapest = { st, c };
    }
    if (cheapest) { gx = cheapest.st.x; gy = cheapest.st.y; }
    else {
      let bd = 1e9;
      for (const b of state.bears) {
        if (b.state === 'dead') continue;
        const d = Math.hypot(b.x - pl.x, b.y - pl.y);
        if (d < bd) { bd = d; gx = b.x; gy = b.y; }
      }
    }
    if (gx !== null && pl.deadT <= 0 && Math.hypot(gx - pl.x, gy - pl.y) > 140) {
      const pp = toScreen(pl.x, 30, pl.y);
      const tp = toScreen(gx, 0, gy);
      const a = Math.atan2(tp.y - pp.y, tp.x - pp.x);
      const bounce = Math.sin(t * 5) * 5;
      uiCtx.save();
      uiCtx.translate(pp.x + Math.cos(a) * (62 + bounce) * k, pp.y + Math.sin(a) * (62 + bounce) * k);
      uiCtx.rotate(a + Math.PI / 2);
      uiCtx.fillStyle = '#52e06a';
      uiCtx.beginPath();
      uiCtx.moveTo(0, -14 * k); uiCtx.lineTo(10 * k, 2 * k); uiCtx.lineTo(4 * k, 2 * k); uiCtx.lineTo(4 * k, 11 * k);
      uiCtx.lineTo(-4 * k, 11 * k); uiCtx.lineTo(-4 * k, 2 * k); uiCtx.lineTo(-10 * k, 2 * k);
      uiCtx.closePath(); uiCtx.fill();
      uiCtx.strokeStyle = 'rgba(255,255,255,.85)'; uiCtx.lineWidth = 1.6; uiCtx.stroke();
      uiCtx.restore();
    }

    // 受傷紅暈 / 被擊倒
    if (pl.hurtFlash > 0) {
      uiCtx.fillStyle = 'rgba(200,30,30,' + Math.min(.4, pl.hurtFlash) + ')';
      uiCtx.fillRect(0, 0, uiW, uiH);
    }
    if (pl.deadT > 0) {
      uiCtx.fillStyle = 'rgba(80,10,10,.4)';
      uiCtx.fillRect(0, 0, uiW, uiH);
      uiCtx.fillStyle = '#fff';
      uiCtx.font = 'bold ' + (22 * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.fillText('💫 被擊倒了…正送回營地', uiW / 2, uiH / 2 - 40);
    }

    // 搖桿
    if (joy) {
      uiCtx.strokeStyle = 'rgba(255,255,255,.45)'; uiCtx.lineWidth = 3;
      uiCtx.beginPath(); uiCtx.arc(joy.sx, joy.sy, 42, 0, 6.28); uiCtx.stroke();
      const d = Math.hypot(joy.dx, joy.dy) || 1;
      const kk = Math.min(d, 40);
      uiCtx.fillStyle = 'rgba(255,255,255,.5)';
      uiCtx.beginPath(); uiCtx.arc(joy.sx + joy.dx / d * kk, joy.sy + joy.dy / d * kk, 20, 0, 6.28); uiCtx.fill();
    }
  }

  // 粒子
  for (const p of particles2d) {
    uiCtx.globalAlpha = Math.max(0, p.life * 2.5);
    uiCtx.fillStyle = p.color;
    uiCtx.fillRect(p.x - 2.5, p.y - 2.5, 5, 5);
  }
  uiCtx.globalAlpha = 1;

  // 漂浮文字（投影到螢幕）
  for (const f of floatTexts) {
    const p = toScreen(f.x, f.h, f.y);
    if (!p.behind) {
      uiCtx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.6));
      uiCtx.fillStyle = f.color;
      uiCtx.font = 'bold ' + (f.size * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.strokeStyle = 'rgba(10,20,40,.6)'; uiCtx.lineWidth = 3;
      uiCtx.strokeText(f.text, p.x, p.y);
      uiCtx.fillText(f.text, p.x, p.y);
    }
  }
  uiCtx.globalAlpha = 1;

  // 標題 / 勝利畫面
  if (state.phase === 'title') {
    drawOverlay('❄️ 寒霜獵人 3D ❄️', [
      '走出營地大門，獵捕冰原巨獸！',
      '',
      '🕹️ 拖曳螢幕（或 WASD）移動',
      '🔨 靠近野獸自動揮舞狼牙棒',
      '🥩 撿肉帶回營地，站上白圈升級：',
      '　 武器・帳篷・營火・招募夥伴',
      '',
      '被打倒會掉落 30% 的肉。',
      '擊敗最北方的「冰原巨獸」獲勝！'
    ], '點擊開始', k);
  } else if (state.phase === 'win') {
    drawOverlay('🏆 巨獸倒下了！', [
      '營地從此不再受冰原巨獸威脅！',
      '',
      '🥩 剩餘肉量：' + Math.floor(state.meat),
      '🐻 狩獵次數：' + state.kills,
      '💫 被擊倒：' + state.deaths + ' 次',
      '🤝 夥伴：' + state.followers.length + ' 名',
      '⚒️ 武器等級：Lv.' + state.stations.anvil.lv
    ], '再玩一次', k);
  }
}

function drawOverlay(title, lines, btnText, k) {
  uiCtx.fillStyle = 'rgba(10,22,42,.62)';
  uiCtx.fillRect(0, 0, uiW, uiH);
  uiCtx.textAlign = 'center';
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold ' + (32 * k) + 'px sans-serif';
  uiCtx.fillText(title, uiW / 2, uiH / 2 - 150 * k);
  uiCtx.fillStyle = '#dce8f5';
  uiCtx.font = (15 * k) + 'px sans-serif';
  lines.forEach((l, i) => uiCtx.fillText(l, uiW / 2, uiH / 2 - 95 * k + i * 28 * k));
  const pulse = 1 + Math.sin(performance.now() / 300) * .04;
  uiCtx.save();
  uiCtx.translate(uiW / 2, uiH / 2 + 185 * k); uiCtx.scale(pulse, pulse);
  uiCtx.fillStyle = '#c25b1e';
  rr(-105 * k, -27 * k, 210 * k, 54 * k, 15 * k); uiCtx.fill();
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold ' + (20 * k) + 'px sans-serif';
  uiCtx.fillText(btnText, 0, 7 * k);
  uiCtx.restore();
  uiCtx.fillStyle = 'rgba(255,255,255,.6)';
  uiCtx.font = (12 * k) + 'px sans-serif';
  uiCtx.fillText('📱 iPhone：Safari「分享 → 加入主畫面」可全螢幕遊玩', uiW / 2, uiH - 52 - safeBot);
  uiCtx.fillText('原創粉絲自製小遊戲・與任何遊戲公司無關', uiW / 2, uiH - 30 - safeBot);
}

// ============ 主迴圈 ============
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  const t = now / 1000;
  update(dt);
  syncGraphics(dt, t);
  if (renderer) renderer.render(scene, camera);
  drawUI(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
