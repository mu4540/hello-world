<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>寒霜求生 ❄️ 廣告同款小遊戲</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a1428;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas { display: block; border-radius: 8px; box-shadow: 0 0 60px rgba(120,180,255,.15); }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
'use strict';

// ===== 畫布與縮放（直式，像 Shorts）=====
const W = 420, H = 740;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===== 簡易音效 =====
let audioCtx = null;
function beep(freq, dur, type, vol) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.1));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.1));
  } catch (e) { /* 無音效也能玩 */ }
}

// ===== 遊戲常數 =====
const FURNACE = { x: W / 2, y: 400 };
const DAY_LEN = 40;          // 每天秒數
const WIN_DAY = 7;           // 撐過第 7 天獲勝
const MAX_SURVIVORS = 8;
const TREE_WOOD = 8;         // 每棵樹可砍的木柴
const WOOD_HEAT = 5;         // 每根木柴升溫度數
const ICE_TAPS = 3;          // 敲幾下救出冰封者

// ===== 遊戲狀態 =====
let state, snow, particles, floatTexts;

function newSurvivor(x, y) {
  return {
    x, y, tx: x, ty: y,
    state: 'idle',        // idle | walk | chop
    tree: null,
    chopTimer: 0,
    bob: Math.random() * 6.28,
    coat: ['#d4622a', '#2a7dd4', '#7d2ad4', '#d42a8c', '#2ad48c'][Math.floor(Math.random() * 5)]
  };
}

function spawnTree() {
  for (let i = 0; i < 50; i++) {
    const x = 40 + Math.random() * (W - 80);
    const y = 150 + Math.random() * 470;
    const dF = Math.hypot(x - FURNACE.x, y - FURNACE.y);
    if (dF < 110) continue;
    let ok = true;
    for (const t of state.trees) if (Math.hypot(x - t.x, y - t.y) < 60) ok = false;
    for (const b of state.ices) if (Math.hypot(x - b.x, y - b.y) < 60) ok = false;
    if (ok) { state.trees.push({ x, y, wood: TREE_WOOD, shake: 0 }); return; }
  }
}

function spawnIce() {
  if (state.ices.length >= 3 || state.survivors.length + state.ices.length >= MAX_SURVIVORS) return;
  for (let i = 0; i < 50; i++) {
    const x = 50 + Math.random() * (W - 100);
    const y = 170 + Math.random() * 430;
    if (Math.hypot(x - FURNACE.x, y - FURNACE.y) < 130) continue;
    let ok = true;
    for (const t of state.trees) if (Math.hypot(x - t.x, y - t.y) < 55) ok = false;
    for (const b of state.ices) if (Math.hypot(x - b.x, y - b.y) < 70) ok = false;
    if (ok) { state.ices.push({ x, y, taps: ICE_TAPS, shake: 0 }); return; }
  }
}

function reset() {
  state = {
    phase: 'title',       // title | play | win | lose
    temp: 80,
    wood: 10,
    day: 1,
    dayTime: 0,
    furnaceLv: 1,
    survivors: [newSurvivor(FURNACE.x - 30, FURNACE.y + 50)],
    trees: [],
    ices: [],
    blizzard: 0,          // 暴風雪剩餘秒數
    blizzardWarn: 0,
    nextBlizzard: 35 + Math.random() * 20,
    iceTimer: 12,
    fireAnim: 0,
    shake: 0,
    rescued: 0,
    chopped: 0
  };
  snow = [];
  for (let i = 0; i < 120; i++) snow.push({ x: Math.random() * W, y: Math.random() * H, s: 1 + Math.random() * 2, v: 30 + Math.random() * 60 });
  particles = [];
  floatTexts = [];
  for (let i = 0; i < 6; i++) spawnTree();
}
reset();

function maxTemp() { return 90 + state.furnaceLv * 10; }
function upgradeCost() { return 25 + state.furnaceLv * 15; }

function addFloat(x, y, text, color) {
  floatTexts.push({ x, y, text, color: color || '#fff', life: 1 });
}

// ===== 輸入 =====
function gamePos(e) {
  const r = canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return { x: cx / r.width * W, y: cy / r.height * H };
}

function onTap(p) {
  if (state.phase === 'title') { state.phase = 'play'; beep(880, .15, 'sine', .06); return; }
  if (state.phase === 'win' || state.phase === 'lose') { reset(); state.phase = 'play'; return; }

  // 升級火爐按鈕
  if (p.x > W - 130 && p.x < W - 10 && p.y > H - 64 && p.y < H - 14) {
    if (state.wood >= upgradeCost()) {
      state.wood -= upgradeCost();
      state.furnaceLv++;
      state.temp = Math.min(state.temp + 15, maxTemp());
      addFloat(FURNACE.x, FURNACE.y - 80, '🔥 火爐升級 Lv.' + state.furnaceLv, '#ffd24a');
      beep(660, .12, 'sine', .06); beep(990, .18, 'sine', .06);
      burst(FURNACE.x, FURNACE.y - 20, '#ffd24a', 18);
    } else {
      addFloat(W - 70, H - 75, '木柴不足！', '#ff7a7a');
      beep(160, .12, 'sawtooth', .05);
    }
    return;
  }
  // 添柴按鈕
  if (p.x > 10 && p.x < 130 && p.y > H - 64 && p.y < H - 14) { feedFire(); return; }

  // 點火爐 → 添柴
  if (Math.hypot(p.x - FURNACE.x, p.y - FURNACE.y + 10) < 55) { feedFire(); return; }

  // 點冰封生還者 → 敲冰
  for (let i = state.ices.length - 1; i >= 0; i--) {
    const b = state.ices[i];
    if (Math.hypot(p.x - b.x, p.y - b.y) < 38) {
      b.taps--; b.shake = 0.25;
      burst(b.x, b.y - 10, '#bfe8ff', 6);
      beep(1200 - b.taps * 200, .07, 'triangle', .05);
      if (b.taps <= 0) {
        state.ices.splice(i, 1);
        state.survivors.push(newSurvivor(b.x, b.y));
        state.rescued++;
        addFloat(b.x, b.y - 30, '🙌 救出生還者 +1', '#7affc8');
        beep(700, .1, 'sine', .06); beep(1050, .2, 'sine', .06);
      }
      return;
    }
  }

  // 點樹 → 派最近的閒置工人去砍
  for (const t of state.trees) {
    if (Math.hypot(p.x - t.x, p.y - (t.y - 20)) < 42) {
      let best = null, bd = 1e9;
      for (const s of state.survivors) {
        if (s.state === 'chop' && s.tree === t) return; // 已有人在砍
        const d = Math.hypot(s.x - t.x, s.y - t.y);
        if (s.state === 'idle' && d < bd) { bd = d; best = s; }
      }
      if (!best) { // 沒閒人就抓一個改派
        for (const s of state.survivors) {
          const d = Math.hypot(s.x - t.x, s.y - t.y);
          if (d < bd) { bd = d; best = s; }
        }
      }
      if (best) {
        best.state = 'walk'; best.tree = t;
        best.tx = t.x + (best.x < t.x ? -22 : 22); best.ty = t.y + 6;
        addFloat(t.x, t.y - 55, '⛏️', '#fff');
        beep(440, .06, 'sine', .04);
      }
      return;
    }
  }
}

function feedFire() {
  if (state.wood <= 0) {
    addFloat(FURNACE.x, FURNACE.y - 70, '沒有木柴了！快砍樹', '#ff7a7a');
    beep(160, .12, 'sawtooth', .05);
    return;
  }
  const n = Math.min(state.wood, 3);
  state.wood -= n;
  state.temp = Math.min(state.temp + n * WOOD_HEAT, maxTemp());
  state.fireAnim = 1;
  addFloat(FURNACE.x, FURNACE.y - 70, '+' + (n * WOOD_HEAT) + '°', '#ffb14a');
  burst(FURNACE.x, FURNACE.y - 30, '#ff9d3c', 10);
  beep(520, .08, 'sine', .05);
}

canvas.addEventListener('pointerdown', e => { e.preventDefault(); onTap(gamePos(e)); });

// ===== 粒子 =====
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 6.28, sp = 40 + Math.random() * 90;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40, life: .5 + Math.random() * .4, color });
  }
}

// ===== 更新 =====
let last = performance.now();
function update(dt) {
  if (state.phase !== 'play') return;

  // 時間與天數
  state.dayTime += dt;
  if (state.dayTime >= DAY_LEN) {
    state.dayTime = 0;
    state.day++;
    if (state.day > WIN_DAY) { state.phase = 'win'; beep(660, .2, 'sine', .07); beep(880, .3, 'sine', .07); return; }
    addFloat(W / 2, 200, '☀️ 第 ' + state.day + ' 天 — 寒流更強了', '#aee2ff');
    beep(500, .15, 'sine', .05);
  }

  // 暴風雪
  if (state.blizzard > 0) {
    state.blizzard -= dt;
  } else {
    state.nextBlizzard -= dt;
    if (state.nextBlizzard < 5 && state.blizzardWarn <= 0) {
      state.blizzardWarn = 5;
      addFloat(W / 2, 230, '⚠️ 暴風雪即將來襲！', '#ff9d9d');
      beep(220, .3, 'sawtooth', .05);
    }
    if (state.blizzardWarn > 0) state.blizzardWarn -= dt;
    if (state.nextBlizzard <= 0) {
      state.blizzard = 8 + state.day;
      state.nextBlizzard = 30 + Math.random() * 25;
    }
  }

  // 溫度下降：天數越多越冷，暴風雪加倍；火爐等級減緩
  let decay = (1.1 + state.day * 0.18) * (state.blizzard > 0 ? 2.3 : 1);
  decay *= Math.pow(0.93, state.furnaceLv - 1);
  state.temp -= decay * dt;
  if (state.temp <= 0) { state.temp = 0; state.phase = 'lose'; beep(150, .6, 'sawtooth', .07); return; }

  // 冰封生還者出現
  state.iceTimer -= dt;
  if (state.iceTimer <= 0) { spawnIce(); state.iceTimer = 14 + Math.random() * 8; }

  // 保持樹的數量
  while (state.trees.length < 5 + Math.min(state.day, 3)) spawnTree();

  // 生還者 AI
  for (const s of state.survivors) {
    s.bob += dt * 6;
    if (s.state === 'idle') {
      // 自動找最近沒人砍的樹
      let best = null, bd = 1e9;
      for (const t of state.trees) {
        let taken = false;
        for (const o of state.survivors) if (o !== s && o.tree === t) taken = true;
        if (taken) continue;
        const d = Math.hypot(s.x - t.x, s.y - t.y);
        if (d < bd) { bd = d; best = t; }
      }
      if (best) {
        s.state = 'walk'; s.tree = best;
        s.tx = best.x + (s.x < best.x ? -22 : 22); s.ty = best.y + 6;
      }
    } else if (s.state === 'walk') {
      if (!s.tree || s.tree.wood <= 0 || state.trees.indexOf(s.tree) < 0) { s.state = 'idle'; s.tree = null; continue; }
      const dx = s.tx - s.x, dy = s.ty - s.y, d = Math.hypot(dx, dy);
      const sp = 70;
      if (d < 4) { s.state = 'chop'; s.chopTimer = 0; }
      else { s.x += dx / d * sp * dt; s.y += dy / d * sp * dt; }
    } else if (s.state === 'chop') {
      if (!s.tree || s.tree.wood <= 0 || state.trees.indexOf(s.tree) < 0) { s.state = 'idle'; s.tree = null; continue; }
      s.chopTimer += dt;
      if (s.chopTimer >= 0.9) {
        s.chopTimer = 0;
        s.tree.wood--; s.tree.shake = 0.2;
        state.wood++; state.chopped++;
        addFloat(s.tree.x, s.tree.y - 50, '🪵+1', '#e8c98a');
        if (Math.random() < .5) beep(300 + Math.random() * 80, .05, 'triangle', .03);
        if (s.tree.wood <= 0) {
          burst(s.tree.x, s.tree.y - 20, '#8a6b3c', 12);
          state.trees.splice(state.trees.indexOf(s.tree), 1);
          s.tree = null; s.state = 'idle';
          spawnTree();
        }
      }
    }
  }

  // 動畫雜項
  if (state.fireAnim > 0) state.fireAnim -= dt * 2;
  for (const t of state.trees) if (t.shake > 0) t.shake -= dt;
  for (const b of state.ices) if (b.shake > 0) b.shake -= dt;

  // 雪
  const wind = state.blizzard > 0 ? 120 : 15;
  for (const f of snow) {
    f.y += f.v * dt * (state.blizzard > 0 ? 2.2 : 1);
    f.x += Math.sin(f.y * .02) * 20 * dt + wind * dt;
    if (f.y > H) { f.y = -5; f.x = Math.random() * W; }
    if (f.x > W) f.x -= W;
  }
  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 150 * dt;
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= dt * 0.8; f.y -= 30 * dt;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }
}

// ===== 繪圖 =====
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawTree(t) {
  const sh = t.shake > 0 ? Math.sin(t.shake * 60) * 3 : 0;
  ctx.save();
  ctx.translate(t.x + sh, t.y);
  // 影子
  ctx.fillStyle = 'rgba(40,70,110,.25)';
  ctx.beginPath(); ctx.ellipse(0, 4, 26, 8, 0, 0, 6.28); ctx.fill();
  // 樹幹
  ctx.fillStyle = '#6b4a2a';
  ctx.fillRect(-5, -18, 10, 22);
  // 三層雪杉
  const g = Math.max(0.35, t.wood / TREE_WOOD);
  for (let i = 0; i < 3; i++) {
    const w = (34 - i * 8) * g + 8, yy = -14 - i * 16;
    ctx.fillStyle = '#1e5c3a';
    ctx.beginPath(); ctx.moveTo(-w, yy); ctx.lineTo(w, yy); ctx.lineTo(0, yy - 22); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(235,245,255,.85)';
    ctx.beginPath(); ctx.moveTo(-w * .7, yy - 8); ctx.lineTo(w * .7, yy - 8); ctx.lineTo(0, yy - 22); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawIce(b) {
  const sh = b.shake > 0 ? Math.sin(b.shake * 70) * 3 : 0;
  ctx.save();
  ctx.translate(b.x + sh, b.y);
  ctx.fillStyle = 'rgba(40,70,110,.25)';
  ctx.beginPath(); ctx.ellipse(0, 18, 24, 7, 0, 0, 6.28); ctx.fill();
  // 冰塊
  ctx.fillStyle = 'rgba(150,210,255,.8)';
  roundRect(-22, -28, 44, 48, 8); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 2;
  roundRect(-22, -28, 44, 48, 8); ctx.stroke();
  // 裂痕
  ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 1.5;
  for (let i = ICE_TAPS; i > b.taps; i--) {
    ctx.beginPath();
    ctx.moveTo(-14 + i * 7, -24);
    ctx.lineTo(-8 + i * 5, -4 + i * 3);
    ctx.lineTo(-16 + i * 8, 16);
    ctx.stroke();
  }
  // 裡面的人影
  ctx.fillStyle = 'rgba(30,50,80,.55)';
  ctx.beginPath(); ctx.arc(0, -12, 7, 0, 6.28); ctx.fill();
  roundRect(-8, -6, 16, 22, 5); ctx.fill();
  // 提示
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('點擊敲冰 ' + b.taps, 0, -38);
  ctx.restore();
}

function drawSurvivor(s) {
  const bob = (s.state === 'walk') ? Math.sin(s.bob * 2) * 2 : 0;
  const swing = (s.state === 'chop') ? Math.sin(s.chopTimer / 0.9 * 6.28) : 0;
  ctx.save();
  ctx.translate(s.x, s.y + bob);
  ctx.fillStyle = 'rgba(40,70,110,.25)';
  ctx.beginPath(); ctx.ellipse(0, 12, 12, 4, 0, 0, 6.28); ctx.fill();
  // 身體（大衣）
  ctx.fillStyle = s.coat;
  roundRect(-8, -12, 16, 24, 6); ctx.fill();
  // 頭+毛帽
  ctx.fillStyle = '#f2c9a0';
  ctx.beginPath(); ctx.arc(0, -18, 7, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#e8eef5';
  ctx.beginPath(); ctx.arc(0, -21, 7, 3.34, 6.08); ctx.fill();
  // 斧頭
  if (s.state === 'chop') {
    ctx.save();
    ctx.translate(9, -8); ctx.rotate(swing * 0.9 - 0.4);
    ctx.fillStyle = '#8a6b3c'; ctx.fillRect(0, -2, 16, 4);
    ctx.fillStyle = '#b8c4d0';
    ctx.beginPath(); ctx.moveTo(16, -7); ctx.lineTo(23, 0); ctx.lineTo(16, 7); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawFurnace() {
  const lv = state.furnaceLv;
  const fx = FURNACE.x, fy = FURNACE.y;
  const flick = 1 + Math.sin(performance.now() / 90) * .08 + state.fireAnim * .3;
  const heat = Math.max(0.15, state.temp / maxTemp());

  // 暖光圈
  const rad = (90 + lv * 25) * heat * flick;
  const grad = ctx.createRadialGradient(fx, fy - 15, 10, fx, fy - 15, rad);
  grad.addColorStop(0, 'rgba(255,160,60,.35)');
  grad.addColorStop(1, 'rgba(255,160,60,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(fx, fy - 15, rad, 0, 6.28); ctx.fill();

  ctx.save();
  ctx.translate(fx, fy);
  // 石爐
  ctx.fillStyle = '#4a5566';
  roundRect(-42, -8, 84, 30, 8); ctx.fill();
  ctx.fillStyle = '#5d6a7d';
  for (let i = -3; i <= 2; i++) { ctx.beginPath(); ctx.arc(i * 13 + 6, 8, 8, 0, 6.28); ctx.fill(); }
  // 火焰
  const fh = (30 + lv * 10) * heat * flick;
  for (const [c, k] of [['#ff5c2a', 1], ['#ff9d3c', .72], ['#ffd24a', .45]]) {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(-20 * k, -5);
    ctx.quadraticCurveTo(-22 * k, -fh * k * .55, 0, -fh * k);
    ctx.quadraticCurveTo(22 * k, -fh * k * .55, 20 * k, -5);
    ctx.closePath(); ctx.fill();
  }
  // 等級牌
  ctx.fillStyle = '#2c3848';
  roundRect(-26, 24, 52, 18, 6); ctx.fill();
  ctx.fillStyle = '#ffd24a';
  ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('火爐 Lv.' + lv, 0, 37);
  ctx.restore();
}

function drawHUD() {
  // 頂部面板
  ctx.fillStyle = 'rgba(12,24,44,.78)';
  roundRect(8, 8, W - 16, 86, 12); ctx.fill();

  // 溫度條
  const tw = W - 130;
  const tr = state.temp / maxTemp();
  ctx.font = '16px sans-serif'; ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText('🌡️', 18, 36);
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  roundRect(46, 20, tw, 20, 10); ctx.fill();
  const tcol = tr > .5 ? '#ff9d3c' : (tr > .25 ? '#ffd24a' : '#ff5c5c');
  ctx.fillStyle = tcol;
  if (tr > 0.02) { roundRect(46, 20, Math.max(14, tw * tr), 20, 10); ctx.fill(); }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(state.temp) + '° / ' + maxTemp() + '°', 46 + tw / 2, 35);

  // 第幾天
  ctx.fillStyle = '#aee2ff';
  ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('第 ' + Math.min(state.day, WIN_DAY) + '/' + WIN_DAY + ' 天', W - 18, 36);

  // 資源列
  ctx.textAlign = 'left';
  ctx.font = '16px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('🪵 ' + state.wood, 18, 72);
  ctx.fillText('👥 ' + state.survivors.length + '/' + MAX_SURVIVORS, 100, 72);
  // 天數進度
  const dw = 150;
  ctx.fillStyle = 'rgba(255,255,255,.15)';
  roundRect(W - 18 - dw, 58, dw, 14, 7); ctx.fill();
  ctx.fillStyle = '#5cb8ff';
  const dr = state.dayTime / DAY_LEN;
  if (dr > 0.03) { roundRect(W - 18 - dw, 58, dw * dr, 14, 7); ctx.fill(); }

  // 底部按鈕：添柴
  ctx.fillStyle = state.wood > 0 ? '#c25b1e' : '#5a4a3c';
  roundRect(10, H - 64, 120, 50, 12); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🔥 添柴', 70, H - 42);
  ctx.font = '11px sans-serif';
  ctx.fillText('-3🪵 → +' + (3 * WOOD_HEAT) + '°', 70, H - 24);

  // 底部按鈕：升級
  const can = state.wood >= upgradeCost();
  ctx.fillStyle = can ? '#1e7dc2' : '#3c4a5a';
  roundRect(W - 130, H - 64, 120, 50, 12); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 17px sans-serif';
  ctx.fillText('⬆️ 升級火爐', W - 70, H - 42);
  ctx.font = '11px sans-serif';
  ctx.fillText(upgradeCost() + '🪵', W - 70, H - 24);

  // 暴風雪提示
  if (state.blizzardWarn > 0 && state.blizzard <= 0) {
    ctx.fillStyle = 'rgba(255,80,80,' + (0.6 + Math.sin(performance.now() / 150) * 0.3) + ')';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('⚠️ 暴風雪 ' + Math.ceil(state.nextBlizzard) + 's', W / 2, 130);
  }
  if (state.blizzard > 0) {
    ctx.fillStyle = '#cfe8ff';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText('🌨️ 暴風雪中！溫度急降', W / 2, 130);
  }
}

function drawOverlayPanel(title, lines, btnText, titleColor) {
  ctx.fillStyle = 'rgba(6,14,30,.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = titleColor;
  ctx.font = 'bold 34px sans-serif';
  ctx.fillText(title, W / 2, 250);
  ctx.fillStyle = '#dce8f5';
  ctx.font = '16px sans-serif';
  lines.forEach((l, i) => ctx.fillText(l, W / 2, 305 + i * 30));
  const pulse = 1 + Math.sin(performance.now() / 300) * .04;
  ctx.save();
  ctx.translate(W / 2, 520); ctx.scale(pulse, pulse);
  ctx.fillStyle = '#c25b1e';
  roundRect(-100, -26, 200, 52, 14); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText(btnText, 0, 7);
  ctx.restore();
}

function draw() {
  // 背景：雪地
  const night = Math.sin(state.dayTime / DAY_LEN * Math.PI); // 中午最亮
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, state.blizzard > 0 ? '#26344a' : '#3c5a82');
  sky.addColorStop(.35, '#5a7aa6');
  sky.addColorStop(.36, '#dfe9f4');
  sky.addColorStop(1, '#c2d4e6');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 遠山
  ctx.fillStyle = 'rgba(160,185,215,.7)';
  ctx.beginPath();
  ctx.moveTo(0, 270);
  ctx.lineTo(80, 190); ctx.lineTo(160, 255); ctx.lineTo(250, 175); ctx.lineTo(340, 250); ctx.lineTo(W, 200);
  ctx.lineTo(W, 280); ctx.lineTo(0, 280);
  ctx.closePath(); ctx.fill();

  // 依 y 排序繪製場景物件
  const objs = [];
  for (const t of state.trees) objs.push({ y: t.y, f: () => drawTree(t) });
  for (const b of state.ices) objs.push({ y: b.y, f: () => drawIce(b) });
  for (const s of state.survivors) objs.push({ y: s.y, f: () => drawSurvivor(s) });
  objs.push({ y: FURNACE.y, f: drawFurnace });
  objs.sort((a, b) => a.y - b.y);
  for (const o of objs) o.f();

  // 粒子
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // 雪
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  for (const f of snow) { ctx.beginPath(); ctx.arc(f.x, f.y, f.s, 0, 6.28); ctx.fill(); }

  // 低溫結霜邊框
  const cold = 1 - state.temp / 35;
  if (cold > 0 && state.phase === 'play') {
    const v = ctx.createRadialGradient(W / 2, H / 2, H * .3, W / 2, H / 2, H * .72);
    v.addColorStop(0, 'rgba(140,190,255,0)');
    v.addColorStop(1, 'rgba(140,190,255,' + Math.min(.75, cold * .8) + ')');
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, W, H);
  }
  // 夜色
  ctx.fillStyle = 'rgba(10,20,45,' + (0.22 * (1 - night)) + ')';
  ctx.fillRect(0, 0, W, H);

  // 漂浮文字
  for (const f of floatTexts) {
    ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.5));
    ctx.fillStyle = f.color;
    ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;

  if (state.phase === 'play') drawHUD();

  if (state.phase === 'title') {
    drawOverlayPanel('❄️ 寒霜求生 ❄️', [
      '寒冬末日，火爐是唯一的希望。',
      '',
      '🌲 點樹砍柴　🔥 點火爐/添柴保溫',
      '🧊 點冰塊敲開，救出生還者',
      '⬆️ 升級火爐抵抗暴風雪',
      '',
      '撐過 ' + WIN_DAY + ' 天就獲勝！溫度歸零就全滅…'
    ], '點擊開始', '#aee2ff');
    ctx.fillStyle = 'rgba(255,255,255,.45)';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('靈感來自《寒霜啟示錄》廣告小遊戲', W / 2, H - 30);
  } else if (state.phase === 'win') {
    drawOverlayPanel('🏆 生存成功！', [
      '你帶領 ' + state.survivors.length + ' 名生還者撐過了 ' + WIN_DAY + ' 天寒冬！',
      '',
      '🪵 共砍伐木柴：' + state.chopped,
      '🙌 救出生還者：' + state.rescued,
      '🔥 火爐等級：Lv.' + state.furnaceLv
    ], '再玩一次', '#ffd24a');
  } else if (state.phase === 'lose') {
    drawOverlayPanel('💀 火爐熄滅了…', [
      '營地在第 ' + state.day + ' 天的寒夜中沉寂。',
      '',
      '🪵 共砍伐木柴：' + state.chopped,
      '🙌 救出生還者：' + state.rescued,
      '',
      '訣竅：留足木柴應付暴風雪，及早升級火爐！'
    ], '重新開始', '#ff8a8a');
  }
}

// ===== 主迴圈 =====
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
