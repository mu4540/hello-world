<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

    touch-action: none;

<body>
<canvas id="gl"></canvas>
<canvas id="ui"></canvas>
<script type="module">
import * as THREE from './three.module.min.js';

// ============ 世界配置（營地在正中央，越遠越冷）============
const WORLD_W = 840, WORLD_H = 2300;
const FURNACE = { x: 420, y: 1150 };          // 中央大火爐
const wx = x => x - FURNACE.x;                 // 世界 → 3D X
const SURVIVOR_GOAL = 5;
const FURNACE_MAX = 5;

function warmRadius() { return 115 + state.furnaceLv * 32; }
function bagCap() { return 8 + state.bagLv * 4; }
function gatherSpeed() { return 1 + state.toolLv * 0.45; }

// 建設圈（站上去自動消耗資源）
function makeRings() {
  return {
    furnace: { x: 420, y: 1235, res: 'wood',  costs: [15, 28, 48, 75], label: '火爐升級', icon: '🔥' },
    bag:     { x: 332, y: 1180, res: 'stone', costs: [10, 22, 40],     label: '背包擴充', icon: '🎒' },
    tool:    { x: 508, y: 1180, res: 'stone', costs: [8, 18, 35],      label: '工具強化', icon: '⚒️' }
  };
}

// ============ 狀態 ============
let state, floatTexts, particles2d;

function ringPos(dist, ang) {
  return { x: FURNACE.x + Math.cos(ang) * dist, y: FURNACE.y + Math.sin(ang) * dist * 0.95 };
}

function genWorld() {
  const trees = [], rocks = [], survivors = [];
  const taken = [];
  const ok = (x, y, r) => {
    if (x < 40 || x > WORLD_W - 40 || y < 90 || y > WORLD_H - 90) return false;
    for (const t of taken) if (Math.hypot(x - t.x, y - t.y) < r + t.r) return false;
    taken.push({ x, y, r });
    return true;
  };
  taken.push({ x: FURNACE.x, y: FURNACE.y, r: 150 });
  for (let i = 0; i < 30; i++) {
    for (let k = 0; k < 30; k++) {
      const p = ringPos(185 + Math.random() * 640, Math.random() * 6.28);
      if (ok(p.x, p.y, 46)) { trees.push({ x: p.x, y: p.y, hp: 4, maxHp: 4, shake: 0, fallT: 0, respawnT: 0, popT: 0 }); break; }
    }
  }
  for (let i = 0; i < 16; i++) {
    for (let k = 0; k < 30; k++) {
      const p = ringPos(225 + Math.random() * 600, Math.random() * 6.28);
      if (ok(p.x, p.y, 44)) { rocks.push({ x: p.x, y: p.y, hp: 5, maxHp: 5, shake: 0, respawnT: 0, popT: 0 }); break; }
    }
  }
  for (let i = 0; i < SURVIVOR_GOAL; i++) {
    for (let k = 0; k < 40; k++) {
      const p = ringPos(380 + Math.random() * 420, (i / SURVIVOR_GOAL) * 6.28 + (Math.random() - .5) * 0.8);
      if (ok(p.x, p.y, 60)) {
        survivors.push({
          x: p.x, y: p.y, state: 'frozen', rescueT: 0,
          vx: 0, vy: 0, heading: Math.random() * 6.28, walk: 0,
          carry: 0, task: 'warm', taskT: 0, target: null
        });
        break;
      }
    }
  }
  return { trees, rocks, survivors };
}

function reset() {
  const w = genWorld();
  state = {
    phase: 'title',
    wood: 0, stone: 0, rescued: 0, collapses: 0,
    chopped: 0, mined: 0, time: 0,
    warmth: 100,
    furnaceLv: 1, bagLv: 0, toolLv: 0,
    player: {
      x: FURNACE.x, y: FURNACE.y + 90, vx: 0, vy: 0, heading: Math.PI,
      walk: 0, carryWood: 0, carryStone: 0,
      action: null, hitT: 0, collapseT: 0, depositT: 0
    },
    rings: makeRings(),
    paid: {},
    trees: w.trees, rocks: w.rocks, survivors: w.survivors,
    items: [],          // 飛行/掉落資源 {type, x,y,h, fly, t, ...}
    shake: 0
  };
  floatTexts = [];
  particles2d = [];
  while (dyn.children.length) dyn.remove(dyn.children[0]);
}

function addFloat(x, y, h, text, color, size) {
  floatTexts.push({ x, y, h: h + 10, text, color: color || '#fff', life: 1.1, size: size || 15 });
}
function burstAt(x, y, h, color, n, spd) {
  const p = toScreen(x, h, y);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 6.28, sp = (spd || 90) * (0.4 + Math.random());
    particles2d.push({ x: p.x, y: p.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 50, life: .35 + Math.random() * .3, color });
  }
}

// ============ 音效 ============
let audioCtx = null;
function unlockAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
function beep(freq, dur, type, vol) {
  try {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime(vol || 0.04, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (dur || 0.1));
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + (dur || 0.1));
  } catch (e) {}
}

// ============ 輸入（單指搖桿 / WASD）============
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let joy = null;
const JOY_R = 36;   // 拇指推滿半徑（小=靈敏）
window.addEventListener('pointerdown', e => {
  e.preventDefault();
  unlockAudio();
  if (state.phase === 'title') { state.phase = 'play'; beep(880, .15, 'sine', .06); return; }
  if (state.phase === 'win') { reset(); state.phase = 'play'; return; }
  joy = { sx: e.clientX, sy: e.clientY, dx: 0, dy: 0, id: e.pointerId };
}, { passive: false });
window.addEventListener('pointermove', e => {
  if (!joy || e.pointerId !== joy.id) return;
  joy.dx = e.clientX - joy.sx; joy.dy = e.clientY - joy.sy;
  // 浮動搖桿：超出半徑時錨點跟著手指走 → 反向改變方向零延遲
  const d = Math.hypot(joy.dx, joy.dy);
  if (d > JOY_R) {
    const ex = (d - JOY_R) / d;
    joy.sx += joy.dx * ex; joy.sy += joy.dy * ex;
    joy.dx = e.clientX - joy.sx; joy.dy = e.clientY - joy.sy;
  }
});
window.addEventListener('pointerup', e => { if (joy && e.pointerId === joy.id) joy = null; });
window.addEventListener('pointercancel', () => { joy = null; });
for (const ev of ['gesturestart', 'gesturechange', 'gestureend']) {
  document.addEventListener(ev, e => e.preventDefault(), { passive: false });
}
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
document.addEventListener('contextmenu', e => e.preventDefault());

// ============ Three.js 場景 ============
const glCanvas = document.getElementById('gl');
const uiCanvas = document.getElementById('ui');
const uiCtx = uiCanvas.getContext('2d');
let renderer = null, glOK = true;
try {
  renderer = new THREE.WebGLRenderer({ canvas: glCanvas, antialias: true });
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
} catch (e) { glOK = false; }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xdde9f5);
scene.fog = new THREE.Fog(0xdde9f5, 780, 1900);

const camera = new THREE.PerspectiveCamera(50, 1, 10, 4000);
const CAM_OFF = new THREE.Vector3(0, 475, 350);
let camTarget = new THREE.Vector3(0, 0, FURNACE.y + 90);

scene.add(new THREE.HemisphereLight(0xcfe2ff, 0xffffff, 0.95));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -480; sun.shadow.camera.right = 480;
sun.shadow.camera.top = 480; sun.shadow.camera.bottom = -480;
sun.shadow.camera.near = 10; sun.shadow.camera.far = 2200;
sun.shadow.bias = -0.002;
scene.add(sun); scene.add(sun.target);

const matCache = {};
function mat(color) {
  if (!matCache[color]) matCache[color] = new THREE.MeshLambertMaterial({ color });
  return matCache[color];
}
function box(w, h, d, color) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat(color));
  m.castShadow = true;
  return m;
}

// 雪地
function snowTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const g = c.getContext('2d');
  g.fillStyle = '#eef3f8'; g.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 60; i++) {
    g.fillStyle = Math.random() < .5 ? 'rgba(255,255,255,.5)' : 'rgba(186,206,228,.32)';
    g.beginPath();
    g.ellipse(Math.random() * 256, Math.random() * 256, 8 + Math.random() * 26, 4 + Math.random() * 10, Math.random() * 3, 0, 6.28);
    g.fill();
  }
  const tx = new THREE.CanvasTexture(c);
  tx.wrapS = tx.wrapT = THREE.RepeatWrapping;
  tx.repeat.set(12, 18);
  return tx;
}
const ground = new THREE.Mesh(new THREE.PlaneGeometry(2400, 3600), new THREE.MeshLambertMaterial({ map: snowTexture() }));
ground.rotation.x = -Math.PI / 2;
ground.position.set(0, 0, FURNACE.y);
ground.receiveShadow = true;
scene.add(ground);

// ===== 中央大火爐（原創造型：石塔＋熔火裂紋＋頂部火焰）=====
const ST = {};
(function buildFurnace() {
  const g = new THREE.Group();
  g.position.set(0, 0, FURNACE.y);
  // 石基座
  const base = new THREE.Mesh(new THREE.CylinderGeometry(26, 30, 12, 12), mat(0x8a93a2));
  base.position.y = 6; base.castShadow = true; base.receiveShadow = true; g.add(base);
  // 爐身石塔
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(13, 17, 52, 10), mat(0x5a626e));
  tower.position.y = 38; tower.castShadow = true; g.add(tower);
  // 熔火環帶（發光）
  const bands = [];
  for (let i = 0; i < 3; i++) {
    const band = new THREE.Mesh(new THREE.TorusGeometry(14.6 - i * 1.1, 1.6, 8, 18),
      new THREE.MeshLambertMaterial({ color: 0xff7a2a, emissive: 0xff5c1a, emissiveIntensity: 1 }));
    band.rotation.x = Math.PI / 2;
    band.position.y = 22 + i * 14;
    g.add(band); bands.push(band);
  }
  // 爐口
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(12, 12, 6),
    new THREE.MeshLambertMaterial({ color: 0x2a1a10, emissive: 0xff6a20, emissiveIntensity: .9 }));
  mouth.position.set(0, 11, 16); g.add(mouth);
  // 頂部火焰
  const flames = [];
  const fc = [[0xff5c2a, 12, 26], [0xff9d3c, 8, 19], [0xffd24a, 4.6, 12]];
  for (const [c, r, h] of fc) {
    const f = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), new THREE.MeshBasicMaterial({ color: c }));
    f.position.y = 64 + h / 2;
    g.add(f); flames.push(f);
  }
  // 火光
  const light = new THREE.PointLight(0xff9d3c, 2, 420, 1.3);
  light.position.y = 50;
  g.add(light);
  // 柴堆裝飾
  for (let i = 0; i < 5; i++) {
    const log = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 2.4, 18, 6), mat(0x6b4a2a));
    log.rotation.z = Math.PI / 2; log.rotation.y = i * 1.3;
    log.position.set(24 + (i % 2) * 5, 2.4, -14 + i * 6);
    log.castShadow = true;
    g.add(log);
  }
  scene.add(g);
  ST.flames = flames; ST.fireLight = light; ST.bands = bands;
})();

// 溫暖區（橘色光圈，半徑隨等級成長）
const warmZone = new THREE.Mesh(new THREE.CircleGeometry(1, 48),
  new THREE.MeshBasicMaterial({ color: 0xff9d3c, transparent: true, opacity: 0.10, depthWrite: false }));
warmZone.rotation.x = -Math.PI / 2;
warmZone.position.set(0, 0.5, FURNACE.y);
scene.add(warmZone);
const warmEdge = new THREE.Mesh(new THREE.RingGeometry(0.965, 1, 56),
  new THREE.MeshBasicMaterial({ color: 0xffb14a, transparent: true, opacity: 0.45, depthWrite: false, side: THREE.DoubleSide }));
warmEdge.rotation.x = -Math.PI / 2;
warmEdge.position.set(0, 0.6, FURNACE.y);
scene.add(warmEdge);

// 營地北側裝飾矮柵欄＋紅門（不擋路）
(function buildDecorFence() {
  const z = FURNACE.y - 150;
  const posts = [];
  for (let x = -150; x <= -40; x += 14) posts.push(x);
  for (let x = 40; x <= 150; x += 14) posts.push(x);
  const post = new THREE.InstancedMesh(new THREE.CylinderGeometry(3.4, 3.8, 24, 7), mat(0xb8884e), posts.length);
  const cap = new THREE.InstancedMesh(new THREE.SphereGeometry(4, 8, 6), mat(0xf4f8fc), posts.length);
  post.castShadow = true;
  const m4 = new THREE.Matrix4();
  posts.forEach((x, i) => {
    m4.makeTranslation(x, 12 + (i % 3), z);
    post.setMatrixAt(i, m4);
    m4.makeTranslation(x, 24 + (i % 3), z);
    cap.setMatrixAt(i, m4);
  });
  scene.add(post); scene.add(cap);
  for (const side of [-1, 1]) {
    const gate = new THREE.Group();
    const frame = box(38, 30, 3, 0xe8a83c); frame.position.y = 15; gate.add(frame);
    const face = box(32, 24, 3.4, 0xc23a3a); face.position.y = 15; gate.add(face);
    const bar = box(36, 4, 3.8, 0xe8a83c); bar.position.y = 15; bar.rotation.z = side * 0.5; gate.add(bar);
    gate.position.set(side * 20, 0, z);
    scene.add(gate);
  }
})();

// 建設圈
const ringGeo = new THREE.RingGeometry(30, 36, 40);
const ringMeshes = {};
for (const [key, r] of Object.entries(makeRings())) {
  const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: .85, side: THREE.DoubleSide, depthWrite: false }));
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(wx(r.x), 0.8, r.y);
  scene.add(ring);
  ringMeshes[key] = ring;
}

// ===== 樹 / 礦石 工廠 =====
function makeTree() {
  const g = new THREE.Group();
  const s = 1.15;
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2.8 * s, 3.4 * s, 13 * s, 6), mat(0x6b4a2a));
  trunk.position.y = 6.5 * s; trunk.castShadow = true; g.add(trunk);
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(17 * s, 27 * s, 7), mat(0x2a6647));
  c1.position.y = 24 * s; c1.castShadow = true; g.add(c1);
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(12 * s, 21 * s, 7), mat(0x35775a));
  c2.position.y = 38 * s; c2.castShadow = true; g.add(c2);
  const snowC = new THREE.Mesh(new THREE.ConeGeometry(7.5 * s, 12 * s, 7), mat(0xf4f8fc));
  snowC.position.y = 49 * s; g.add(snowC);
  return g;
}
function makeOreRock() {
  const g = new THREE.Group();
  const r1 = new THREE.Mesh(new THREE.DodecahedronGeometry(11, 0), mat(0x8b97a6));
  r1.position.y = 5; r1.scale.y = .75; r1.castShadow = true; g.add(r1);
  const r2 = new THREE.Mesh(new THREE.DodecahedronGeometry(7, 0), mat(0x7a8694));
  r2.position.set(9, 3.4, 4); r2.scale.y = .7; r2.castShadow = true; g.add(r2);
  for (let i = 0; i < 3; i++) {
    const ore = new THREE.Mesh(new THREE.DodecahedronGeometry(2.2, 0),
      new THREE.MeshLambertMaterial({ color: 0xd88a3c, emissive: 0x8a4a10, emissiveIntensity: .65 }));
    ore.position.set(-5 + i * 5, 7 + (i % 2) * 3, 5 - i * 3);
    g.add(ore);
  }
  return g;
}
function makeDeadTree(s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(2 * s, 3.4 * s, 50 * s, 6), mat(0x8a6248));
  trunk.position.y = 25 * s; trunk.castShadow = true; g.add(trunk);
  for (let i = 0; i < 4; i++) {
    const br = new THREE.Mesh(new THREE.CylinderGeometry(1 * s, 1.6 * s, 19 * s, 5), mat(0x8a6248));
    br.position.y = (15 + i * 9) * s;
    br.rotation.z = (i % 2 ? 1 : -1) * 1.0;
    br.position.x = (i % 2 ? 1 : -1) * 7 * s;
    br.castShadow = true;
    g.add(br);
  }
  return g;
}
function makeBoulder(s) {
  const r = new THREE.Mesh(new THREE.DodecahedronGeometry(10 * s, 0), mat(0xa8b2bf));
  r.position.y = 4 * s; r.scale.y = 0.65; r.castShadow = true;
  return r;
}

// 遠景裝飾
(function buildDecor() {
  for (let i = 0; i < 26; i++) {
    const a = Math.random() * 6.28;
    const d = 880 + Math.random() * 320;
    const x = FURNACE.x + Math.cos(a) * d, y = FURNACE.y + Math.sin(a) * d * 0.95;
    const s = .8 + Math.random() * .7;
    const m = Math.random() < .55 ? makeDeadTree(s) : makeBoulder(s);
    m.position.set(wx(x), 0, y);
    m.rotation.y = Math.random() * 6.28;
    scene.add(m);
  }
  for (let i = 0; i < 10; i++) {   // 玩法區內少量枯樹點綴
    const a = Math.random() * 6.28, d = 260 + Math.random() * 560;
    const x = FURNACE.x + Math.cos(a) * d, y = FURNACE.y + Math.sin(a) * d * 0.95;
    const m = makeDeadTree(.6 + Math.random() * .4);
    m.position.set(wx(x), 0, y);
    scene.add(m);
  }
})();

// ===== 角色工廠（Q 版生還者：大頭、連帽厚外套、手套靴子、背包）=====
const woodSlotMat = mat(0xb8884e);
const stoneSlotMat = mat(0x9aa6b4);
function makePerson(coat) {
  const g = new THREE.Group();
  const bodyG = new THREE.Group();       // 可前傾（發抖/虛弱姿勢用）
  g.add(bodyG);
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(5.8, 7, 4, 10), mat(coat));
  body.position.y = 11.5; body.castShadow = true; bodyG.add(body);
  // 大頭 Q 版
  const head = new THREE.Mesh(new THREE.SphereGeometry(7, 14, 12), mat(0xf2c9a0));
  head.position.y = 25; head.castShadow = true; bodyG.add(head);
  const hood = new THREE.Mesh(new THREE.SphereGeometry(7.6, 14, 9, 0, Math.PI * 2, 0, Math.PI / 1.9), mat(coat));
  hood.position.y = 26; bodyG.add(hood);
  const hoodRim = new THREE.Mesh(new THREE.TorusGeometry(6.4, 1.4, 6, 14), mat(0xf4f8fc));
  hoodRim.position.y = 25.5; hoodRim.rotation.x = 0.35; bodyG.add(hoodRim);
  // 手臂（手套）
  const arms = {};
  for (const side of [-1, 1]) {
    const pivot = new THREE.Group();
    pivot.position.set(side * 7.4, 18.5, 0);
    const arm = new THREE.Mesh(new THREE.CapsuleGeometry(2.3, 7, 4, 8), mat(coat));
    arm.position.y = -4.5; arm.castShadow = true;
    pivot.add(arm);
    const glove = new THREE.Mesh(new THREE.SphereGeometry(2.7, 8, 6), mat(0x5a4634));
    glove.position.y = -10;
    pivot.add(glove);
    bodyG.add(pivot);
    arms[side] = pivot;
  }
  // 靴子
  for (const side of [-1, 1]) {
    const boot = new THREE.Mesh(new THREE.BoxGeometry(4.4, 4, 6), mat(0x4a3826));
    boot.position.set(side * 3.4, 2, 1);
    boot.castShadow = true;
    g.add(boot);
  }
  // 背包 + 可見的資源堆
  const pack = new THREE.Mesh(new THREE.BoxGeometry(9.5, 11, 5), mat(0x8a6b46));
  pack.position.set(0, 14, -6.5); pack.castShadow = true; bodyG.add(pack);
  const packStrap = new THREE.Mesh(new THREE.BoxGeometry(10.5, 2.4, 5.6), mat(0x5a4634));
  packStrap.position.set(0, 16, -6.5); bodyG.add(packStrap);
  const slots = [];
  const slotGeo = new THREE.CylinderGeometry(1.9, 1.9, 8.6, 6);
  for (let i = 0; i < 12; i++) {
    const slot = new THREE.Mesh(slotGeo, woodSlotMat);
    slot.rotation.z = Math.PI / 2;
    slot.position.set(0, 20.5 + Math.floor(i / 3) * 3.6, -6.5 + (i % 3) * 0 - 0);
    slot.position.x = (i % 3 - 1) * 0;
    slot.position.set((i % 2 ? 2.2 : -2.2) * ((Math.floor(i / 2) % 2) ? 1 : .5), 20.5 + Math.floor(i / 4) * 3.8, -6.5);
    slot.visible = false;
    bodyG.add(slot);
    slots.push(slot);
  }
  // 工具（依動作自動出現）
  const axe = new THREE.Group();
  {
    const handle = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 15, 6), mat(0x8a6b46));
    handle.position.y = -6; axe.add(handle);
    const blade = new THREE.Mesh(new THREE.BoxGeometry(2, 5.5, 7.5), mat(0xc2cad4));
    blade.position.set(0, -13, 3); axe.add(blade);
  }
  axe.visible = false;
  arms[1].add(axe);
  const pick = new THREE.Group();
  {
    const handle = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 15, 6), mat(0x8a6b46));
    handle.position.y = -6; pick.add(handle);
    for (const side of [-1, 1]) {
      const headP = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.4, 8), mat(0xb0bac6));
      headP.position.set(0, -13, side * 4);
      headP.rotation.x = side * 0.5;
      pick.add(headP);
    }
  }
  pick.visible = false;
  arms[1].add(pick);

  g.userData = { bodyG, body, armL: arms[-1], armR: arms[1], slots, axe, pick };
  return g;
}

let uiW = 0, uiH = 0, safeTop = 0, safeBot = 0;
function resize() {
  const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  uiW = vw; uiH = vh;
  if (renderer) { renderer.setPixelRatio(dpr); renderer.setSize(vw, vh, true); }
  camera.aspect = vw / vh;
  camera.updateProjectionMatrix();
  uiCanvas.width = Math.round(vw * dpr);
  uiCanvas.height = Math.round(vh * dpr);
  uiCanvas.style.width = vw + 'px';
  uiCanvas.style.height = vh + 'px';
  uiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const cs = getComputedStyle(document.documentElement);
  safeTop = parseFloat(cs.getPropertyValue('--sat')) || 0;
  safeBot = parseFloat(cs.getPropertyValue('--sab')) || 0;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);

const _v3 = new THREE.Vector3();
function toScreen(x, h, z) {
  _v3.set(wx(x), h, z).project(camera);
  return { x: (_v3.x + 1) / 2 * uiW, y: (1 - _v3.y) / 2 * uiH, behind: _v3.z > 1 };
}

reset();

function lerpAngle(a, b, t) {
  const d = ((b - a + Math.PI) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2) - Math.PI;
  return a + d * Math.min(1, t);
}

// ============ 遊戲邏輯 ============
function carried() { return state.player.carryWood + state.player.carryStone; }
function coldLevel() { return state.warmth < 15 ? 2 : (state.warmth < 40 ? 1 : 0); }

function spawnItem(type, x, y, toPlayer) {
  const a = Math.random() * 6.28;
  state.items.push({
    type, x, y, h: 14,
    vx: Math.cos(a) * 50, vy: Math.sin(a) * 50, vh: 90 + Math.random() * 60,
    fly: !!toPlayer, t: 0, fx0: x, fy0: y, fh0: 14, ground: !toPlayer
  });
}

function update(dt) {
  if (state.phase !== 'play') return;
  state.time += dt;
  const pl = state.player;

  // --- 凍倒 ---
  if (pl.collapseT > 0) {
    pl.collapseT -= dt;
    pl.vx = pl.vy = 0;
    if (pl.collapseT <= 0) {
      pl.x = FURNACE.x; pl.y = FURNACE.y + 80;
      state.warmth = 65;
      addFloat(pl.x, pl.y, 40, '在火爐邊甦醒', '#aee2ff');
    }
  } else {
    // --- 移動（單指搖桿類比 + 載重/寒冷影響）---
    let mx = 0, my = 0;
    if (keys['w'] || keys['arrowup']) my -= 1;
    if (keys['s'] || keys['arrowdown']) my += 1;
    if (keys['a'] || keys['arrowleft']) mx -= 1;
    if (keys['d'] || keys['arrowright']) mx += 1;
    if (joy) {
      const d = Math.hypot(joy.dx, joy.dy);
      if (d > 4) { const k = Math.min(1, d / JOY_R); mx = joy.dx / d * k; my = joy.dy / d * k; }
    }
    const ml = Math.hypot(mx, my);
    if (ml > 1) { mx /= ml; my /= ml; }
    const moving = ml > 0.15;
    const loadF = 1 - 0.28 * (carried() / bagCap());
    const coldF = coldLevel() === 2 ? 0.55 : (coldLevel() === 1 ? 0.85 : 1);
    const SP = 195 * loadF * coldF;
    // 起步快、放開停得更快 → 跟手
    const ease = 1 - Math.exp(-(moving ? 17 : 22) * dt);
    pl.vx += (mx * SP - pl.vx) * ease;
    pl.vy += (my * SP - pl.vy) * ease;
    pl.x = Math.max(24, Math.min(WORLD_W - 24, pl.x + pl.vx * dt));
    pl.y = Math.max(70, Math.min(WORLD_H - 70, pl.y + pl.vy * dt));
    const spd = Math.hypot(pl.vx, pl.vy);
    if (spd > 15) {
      pl.walk += spd * dt * 0.075;
      pl.heading = lerpAngle(pl.heading, Math.atan2(pl.vx, pl.vy), 19 * dt);
      // 腳印
      fpTimer -= dt;
      if (fpTimer <= 0) {
        fpTimer = 0.16;
        fpSide = -fpSide;
        const fp = footprints[fpIdx++ % FP_N];
        const px = Math.cos(pl.heading), pz = -Math.sin(pl.heading);
        fp.mesh.position.set(wx(pl.x) + px * fpSide * 3.4, 0.4, pl.y + pz * fpSide * 3.4);
        fp.mesh.rotation.z = -pl.heading;
        fp.life = 1;
      }
    }

    // --- 自動互動（靠近即動作；移動會中斷）---
    if (moving) { pl.action = null; }
    else if (!pl.action) {
      let best = null;
      for (const tr of state.trees) {
        if (tr.hp <= 0) continue;
        const d = Math.hypot(tr.x - pl.x, tr.y - pl.y);
        if (d < 42 && (!best || d < best.d)) best = { type: 'chop', t: tr, d };
      }
      for (const rk of state.rocks) {
        if (rk.hp <= 0) continue;
        const d = Math.hypot(rk.x - pl.x, rk.y - pl.y);
        if (d < 42 && (!best || d < best.d)) best = { type: 'mine', t: rk, d };
      }
      for (const sv of state.survivors) {
        if (sv.state !== 'frozen') continue;
        const d = Math.hypot(sv.x - pl.x, sv.y - pl.y);
        if (d < 42 && (!best || d < best.d)) best = { type: 'rescue', t: sv, d };
      }
      if (best) {
        pl.action = { type: best.type, target: best.t, t: 0 };
        pl.heading = Math.atan2(best.t.x - pl.x, best.t.y - pl.y);
        pl.hitT = 0;
      }
    }
    if (pl.action) {
      const A = pl.action;
      const tgt = A.target;
      const gone = (A.type === 'chop' && tgt.hp <= 0) || (A.type === 'mine' && tgt.hp <= 0) ||
                   (A.type === 'rescue' && tgt.state !== 'frozen') ||
                   Math.hypot(tgt.x - pl.x, tgt.y - pl.y) > 52;
      if (gone) pl.action = null;
      else if (A.type === 'rescue') {
        tgt.rescueT += dt;
        if (tgt.rescueT >= 2) {
          tgt.state = 'follow';
          state.rescued++;
          burstAt(tgt.x, tgt.y, 20, '#bfe8ff', 16, 120);
          addFloat(tgt.x, tgt.y, 40, '🙌 生還者獲救！', '#7affc8', 17);
          beep(700, .1, 'sine', .06); beep(1050, .2, 'sine', .06);
          pl.action = null;
          checkWin();
        }
      } else {
        const interval = (A.type === 'chop' ? 0.52 : 0.62) / gatherSpeed();
        pl.hitT += dt;
        if (pl.hitT >= interval) {
          pl.hitT = 0;
          if (carried() >= bagCap()) {
            addFloat(pl.x, pl.y, 42, '🎒 背包滿了！回火爐存放', '#ffd24a', 14);
            beep(200, .1, 'sawtooth', .04);
            pl.action = null;
          } else {
            tgt.hp--; tgt.shake = 0.22;
            if (A.type === 'chop') {
              spawnItem('wood', tgt.x, tgt.y, true);
              burstAt(tgt.x, tgt.y, 26, '#b8884e', 6);
              beep(300 + Math.random() * 60, .06, 'triangle', .05);
              state.chopped++;
              if (tgt.hp <= 0) { tgt.fallT = 0.001; tgt.respawnT = 20; spawnItem('wood', tgt.x, tgt.y, true); }
            } else {
              spawnItem('stone', tgt.x, tgt.y, true);
              burstAt(tgt.x, tgt.y, 16, '#aab6c4', 6);
              beep(520 + Math.random() * 80, .05, 'square', .04);
              state.mined++;
              if (tgt.hp <= 0) { tgt.respawnT = 24; spawnItem('stone', tgt.x, tgt.y, true); }
            }
          }
        }
      }
    }

    // --- 存放資源（靠近火爐自動）---
    const df = Math.hypot(pl.x - FURNACE.x, pl.y - FURNACE.y);
    if (df < 80 && carried() > 0) {
      pl.depositT -= dt;
      if (pl.depositT <= 0) {
        pl.depositT = 0.07;
        if (pl.carryWood > 0) { pl.carryWood--; state.wood++; addFloat(pl.x, pl.y, 44, '+1 🪵', '#e8c98a', 13); }
        else { pl.carryStone--; state.stone++; addFloat(pl.x, pl.y, 44, '+1 🪨', '#cdd6e0', 13); }
        beep(880 + Math.random() * 200, .04, 'sine', .035);
      }
    }

    // --- 溫暖度 ---
    if (df < warmRadius()) {
      state.warmth = Math.min(100, state.warmth + 30 * dt);
    } else {
      const drain = 2.2 + Math.min(5.5, (df - warmRadius()) / 200);
      state.warmth -= drain * dt;
      if (state.warmth <= 0) {
        state.warmth = 0;
        collapse();
      }
    }
  }

  // --- 建設圈 ---
  for (const key in state.rings) {
    const r = state.rings[key];
    const lvNow = key === 'furnace' ? state.furnaceLv - 1 : (key === 'bag' ? state.bagLv : state.toolLv);
    if (lvNow >= r.costs.length) continue;
    if (pl.collapseT <= 0 && Math.hypot(pl.x - r.x, pl.y - r.y) < 44 && state[r.res] > 0) {
      const cost = r.costs[lvNow];
      const paid = state.paid[key] || 0;
      const pay = Math.min(state[r.res], 14 * dt, cost - paid);
      if (pay > 0) {
        state[r.res] -= pay;
        state.paid[key] = paid + pay;
        if (state.paid[key] >= cost - 0.01) {
          state.paid[key] = 0;
          applyUpgrade(key);
        }
      }
    }
  }

  // --- 樹 / 礦重生 ---
  for (const tr of state.trees) {
    if (tr.shake > 0) tr.shake -= dt;
    if (tr.hp <= 0) {
      if (tr.fallT > 0 && tr.fallT < 1.2) tr.fallT += dt;
      tr.respawnT -= dt;
      if (tr.respawnT <= 0) { tr.hp = tr.maxHp; tr.fallT = 0; tr.popT = 0.5; }
    }
    if (tr.popT > 0) tr.popT -= dt;
  }
  for (const rk of state.rocks) {
    if (rk.shake > 0) rk.shake -= dt;
    if (rk.hp <= 0) {
      rk.respawnT -= dt;
      if (rk.respawnT <= 0) { rk.hp = rk.maxHp; rk.popT = 0.5; }
    }
    if (rk.popT > 0) rk.popT -= dt;
  }

  // --- 生還者：跟隨 → 抵達營地變幫手 ---
  for (const sv of state.survivors) {
    if (sv.state === 'frozen') {
      if (sv.rescueT > 0 && (!pl.action || pl.action.target !== sv)) sv.rescueT = Math.max(0, sv.rescueT - dt * 2);
      continue;
    }
    let tx = sv.x, ty = sv.y, spdT = 150;
    if (sv.state === 'follow') {
      tx = pl.x - Math.sin(pl.heading) * 30; ty = pl.y - Math.cos(pl.heading) * 30;
      if (Math.hypot(sv.x - FURNACE.x, sv.y - FURNACE.y) < warmRadius() * 0.8) {
        sv.state = 'helper'; sv.task = 'warm'; sv.taskT = 2;
        addFloat(sv.x, sv.y, 40, '🤝 加入營地，幫忙砍柴！', '#7ad4ff', 15);
      }
    } else if (sv.state === 'helper') {
      // 幫手循環：取暖 → 砍樹 → 揹回火爐
      if (sv.task === 'warm') {
        tx = FURNACE.x + 40; ty = FURNACE.y + 40;
        sv.taskT -= dt;
        if (sv.taskT <= 0) {
          let best = null, bd = 1e9;
          for (const tr of state.trees) {
            if (tr.hp <= 0) continue;
            const d = Math.hypot(tr.x - FURNACE.x, tr.y - FURNACE.y);
            if (d < 430 && d < bd) { bd = d; best = tr; }
          }
          if (best) { sv.task = 'chop'; sv.target = best; sv.taskT = 0; }
          else sv.taskT = 2;
        }
      } else if (sv.task === 'chop') {
        const tr = sv.target;
        if (!tr || tr.hp <= 0) {
          sv.task = sv.carry > 0 ? 'return' : 'warm'; sv.taskT = 1;
        } else {
          const d = Math.hypot(tr.x - sv.x, tr.y - sv.y);
          if (d > 36) { tx = tr.x; ty = tr.y; }
          else {
            tx = sv.x; ty = sv.y;
            sv.heading = Math.atan2(tr.x - sv.x, tr.y - sv.y);
            sv.taskT += dt;
            sv.swing = (sv.taskT % 0.9) / 0.9;
            if (sv.taskT >= 0.9) {
              sv.taskT = 0;
              tr.hp--; tr.shake = 0.2;
              sv.carry++;
              burstAt(tr.x, tr.y, 26, '#b8884e', 4);
              if (tr.hp <= 0) { tr.fallT = 0.001; tr.respawnT = 20; }
              if (sv.carry >= 4) sv.task = 'return';
            }
          }
        }
      } else if (sv.task === 'return') {
        tx = FURNACE.x + 30; ty = FURNACE.y + 50;
        if (Math.hypot(sv.x - FURNACE.x, sv.y - FURNACE.y) < 80) {
          state.wood += sv.carry;
          addFloat(sv.x, sv.y, 40, '+' + sv.carry + ' 🪵', '#e8c98a', 14);
          sv.carry = 0;
          sv.task = 'warm'; sv.taskT = 1.2;
          beep(760, .07, 'sine', .04);
        }
      }
    }
    const dx = tx - sv.x, dy = ty - sv.y, d = Math.hypot(dx, dy);
    const want = d > 14;
    const fease = 1 - Math.exp(-9 * dt);
    sv.vx += ((want ? dx / d * spdT : 0) - sv.vx) * fease;
    sv.vy += ((want ? dy / d * spdT : 0) - sv.vy) * fease;
    sv.x += sv.vx * dt; sv.y += sv.vy * dt;
    const fspd = Math.hypot(sv.vx, sv.vy);
    if (fspd > 15) {
      sv.walk += fspd * dt * 0.075;
      sv.heading = lerpAngle(sv.heading, Math.atan2(sv.vx, sv.vy), 12 * dt);
    }
  }

  // --- 資源小物件 ---
  for (const it of state.items) {
    if (it.fly) {
      it.t += dt * 3.4;
      if (it.t >= 1) {
        it.done = true;
        if (carried() < bagCap()) {
          if (it.type === 'wood') pl.carryWood++; else pl.carryStone++;
          beep(980 + Math.random() * 250, .04, 'sine', .04);
        } else {
          // 沒位置 → 掉在地上
          state.items.push({ type: it.type, x: pl.x + (Math.random() - .5) * 30, y: pl.y + 20 + Math.random() * 14, h: 0, vx: 0, vy: 0, vh: 0, fly: false, ground: true, t: 0 });
        }
      } else {
        it.x = it.fx0 + (pl.x - it.fx0) * it.t;
        it.y = it.fy0 + (pl.y - it.fy0) * it.t;
        it.h = it.fh0 + (22 - it.fh0) * it.t + Math.sin(it.t * Math.PI) * 14;
      }
    } else {
      it.x += it.vx * dt; it.y += it.vy * dt;
      it.vx *= Math.exp(-2.5 * dt); it.vy *= Math.exp(-2.5 * dt);
      it.vh -= 380 * dt;
      it.h += it.vh * dt;
      if (it.h <= 0) { it.h = 0; it.vh = -it.vh * 0.3; if (Math.abs(it.vh) < 25) it.vh = 0; }
      if (pl.collapseT <= 0 && carried() < bagCap() && Math.hypot(pl.x - it.x, pl.y - it.y) < 46) {
        it.fly = true; it.t = 0; it.fx0 = it.x; it.fy0 = it.y; it.fh0 = it.h;
      }
    }
  }
  for (const it of state.items) {
    if (it.done && it.mesh) { dyn.remove(it.mesh); it.mesh = null; }
  }
  state.items = state.items.filter(it => !it.done);

  if (state.shake > 0) state.shake -= dt;

  for (let i = particles2d.length - 1; i >= 0; i--) {
    const p = particles2d[i];
    p.life -= dt;
    if (p.life <= 0) { particles2d.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 280 * dt;
  }
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= dt * 0.85; f.h += 26 * dt;
    if (f.life <= 0) floatTexts.splice(i, 1);
  }
}

function collapse() {
  const pl = state.player;
  pl.collapseT = 2.4;
  state.collapses++;
  pl.action = null;
  // 掉落一半攜帶資源
  const dropW = Math.ceil(pl.carryWood / 2), dropS = Math.ceil(pl.carryStone / 2);
  pl.carryWood -= dropW; pl.carryStone -= dropS;
  for (let i = 0; i < dropW; i++) spawnItem('wood', pl.x, pl.y, false);
  for (let i = 0; i < dropS; i++) spawnItem('stone', pl.x, pl.y, false);
  addFloat(pl.x, pl.y, 40, '🥶 凍倒了…', '#9fd4ff', 18);
  state.shake = 0.3;
  beep(120, .5, 'sawtooth', .07);
}

function applyUpgrade(key) {
  if (key === 'furnace') {
    state.furnaceLv++;
    addFloat(FURNACE.x, FURNACE.y, 80, '🔥 火爐 Lv.' + state.furnaceLv + '！溫暖範圍擴大', '#ffb14a', 17);
    burstAt(FURNACE.x, FURNACE.y, 70, '#ffb14a', 16);
  } else if (key === 'bag') {
    state.bagLv++;
    addFloat(state.rings.bag.x, state.rings.bag.y, 40, '🎒 背包容量 ' + bagCap() + '！', '#7aff9d', 16);
  } else if (key === 'tool') {
    state.toolLv++;
    addFloat(state.rings.tool.x, state.rings.tool.y, 40, '⚒️ 採集速度提升！', '#ffd24a', 16);
  }
  beep(660, .1, 'sine', .06); beep(990, .18, 'sine', .06);
  checkWin();
}

function checkWin() {
  if (state.furnaceLv >= FURNACE_MAX && state.rescued >= SURVIVOR_GOAL) {
    state.phase = 'win';
    beep(660, .2, 'sine', .08); beep(880, .25, 'sine', .08); beep(1100, .4, 'sine', .08);
  }
}

// ============ 圖形同步 ============
function ensurePerson(ent, coat) {
  if (!ent.mesh) { ent.mesh = makePerson(coat); dyn.add(ent.mesh); }
  return ent.mesh;
}

function animatePerson(mesh, ent, opt, t) {
  const u = mesh.userData;
  const cold = opt.cold || 0;
  // 發抖
  const jx = cold > 0 ? (Math.random() - .5) * cold * 1.6 : 0;
  const jz = cold > 0 ? (Math.random() - .5) * cold * 1.6 : 0;
  mesh.position.set(wx(ent.x) + jx, Math.abs(Math.sin(ent.walk)) * 1.7, ent.y + jz);
  mesh.rotation.y = ent.heading;
  // 虛弱前傾 / 取暖放鬆
  u.bodyG.rotation.x = cold === 2 ? 0.32 : (cold === 1 ? 0.14 : 0);
  // 呼吸
  u.body.scale.y = 1 + Math.sin(t * 2.2 + ent.x) * 0.025;
  const act = opt.action;
  u.axe.visible = act === 'chop';
  u.pick.visible = act === 'mine';
  if (act === 'chop' || act === 'mine') {
    // 連續揮擊
    u.armR.rotation.x = -2.2 + 2.6 * Math.abs(Math.sin((opt.swingT || 0) * Math.PI / (opt.interval || 0.52)));
    u.armL.rotation.x = 0.3;
  } else if (act === 'rescue') {
    u.armR.rotation.x = -1.2 + Math.sin(t * 10) * 0.4;
    u.armL.rotation.x = -1.2 - Math.sin(t * 10) * 0.4;
  } else {
    u.armR.rotation.x = -0.4 + Math.sin(ent.walk) * 0.55;
    u.armL.rotation.x = -0.4 - Math.sin(ent.walk) * 0.55;
  }
  // 背包資源堆
  const cw = opt.carryWood || 0, cs = opt.carryStone || 0;
  for (let i = 0; i < u.slots.length; i++) {
    const s = u.slots[i];
    if (i < cw) { s.visible = true; s.material = woodSlotMat; }
    else if (i < cw + cs) { s.visible = true; s.material = stoneSlotMat; }
    else s.visible = false;
  }
}

function syncGraphics(dt, t) {
  const pl = state.player;

  // 玩家
  const pm = ensurePerson(pl, 0x4a90d4);
  pm.visible = true;
  if (pl.collapseT > 0) {
    pm.rotation.z = Math.min((2.4 - pl.collapseT) * 4, 1.5);
    pm.position.set(wx(pl.x), 0, pl.y);
  } else {
    pm.rotation.z = 0;
    animatePerson(pm, pl, {
      cold: coldLevel(),
      action: pl.action ? pl.action.type : null,
      swingT: pl.hitT, interval: pl.action && pl.action.type === 'mine' ? 0.62 / gatherSpeed() : 0.52 / gatherSpeed(),
      carryWood: pl.carryWood, carryStone: pl.carryStone
    }, t);
  }

  // 生還者
  for (const sv of state.survivors) {
    const m = ensurePerson(sv, 0xa8423c);
    if (sv.state === 'frozen') {
      if (!sv.iceMesh) { sv.iceMesh = makeIceBlock(); dyn.add(sv.iceMesh); }
      sv.iceMesh.position.set(wx(sv.x), 16, sv.y);
      sv.iceMesh.material.opacity = 0.55 - (sv.rescueT / 2) * 0.3;
      m.position.set(wx(sv.x), 0, sv.y);
      m.rotation.y = sv.heading;
      m.userData.bodyG.rotation.x = 0.45;   // 蜷縮
      m.userData.armR.rotation.x = -1.5;
      m.userData.armL.rotation.x = -1.5;
    } else {
      if (sv.iceMesh) { dyn.remove(sv.iceMesh); sv.iceMesh = null; }
      animatePerson(m, sv, {
        action: sv.task === 'chop' && sv.swing !== undefined && Math.hypot((sv.target ? sv.target.x : 0) - sv.x, (sv.target ? sv.target.y : 0) - sv.y) < 40 ? 'chop' : null,
        swingT: sv.taskT, interval: 0.9,
        carryWood: sv.carry, carryStone: 0
      }, t);
    }
  }

  // 樹
  for (const tr of state.trees) {
    if (!tr.mesh) { tr.mesh = makeTree(); dyn.add(tr.mesh); }
    const m = tr.mesh;
    if (tr.hp <= 0) {
      if (tr.fallT > 0 && tr.fallT < 1.2) {
        m.visible = true;
        m.rotation.z = Math.min(tr.fallT * 2.4, 1.5);
        m.position.set(wx(tr.x), tr.fallT > 0.6 ? -(tr.fallT - 0.6) * 30 : 0, tr.y);
      } else m.visible = false;
    } else {
      m.visible = true;
      const pop = tr.popT > 0 ? 1 - tr.popT * 0.9 : 1;
      m.scale.setScalar(Math.max(0.1, pop));
      m.rotation.z = tr.shake > 0 ? Math.sin(tr.shake * 50) * 0.06 : 0;
      m.position.set(wx(tr.x), 0, tr.y);
    }
  }
  // 礦石
  for (const rk of state.rocks) {
    if (!rk.mesh) { rk.mesh = makeOreRock(); dyn.add(rk.mesh); }
    const m = rk.mesh;
    if (rk.hp <= 0) m.visible = false;
    else {
      m.visible = true;
      const pop = rk.popT > 0 ? 1 - rk.popT * 0.9 : 1;
      const sc = (0.5 + 0.5 * (rk.hp / rk.maxHp)) * Math.max(0.1, pop);
      m.scale.setScalar(sc);
      m.position.set(wx(rk.x) + (rk.shake > 0 ? Math.sin(rk.shake * 60) * 2 : 0), 0, rk.y);
    }
  }

  // 資源小物件
  for (const it of state.items) {
    if (!it.mesh) { it.mesh = makeItemMesh(it.type); dyn.add(it.mesh); }
    it.mesh.position.set(wx(it.x), 3 + it.h, it.y);
    it.mesh.rotation.y += dt * 3;
  }

  // 火爐動畫
  const flick = 1 + Math.sin(t * 11) * .1 + Math.sin(t * 23.7) * .06;
  const fs = 0.75 + state.furnaceLv * 0.14;
  ST.flames.forEach((f, i) => {
    const s = fs * flick * (1 - i * 0.06);
    f.scale.set(s, s * (1 + Math.sin(t * 9 + i) * .12), s);
  });
  ST.fireLight.intensity = (1.4 + state.furnaceLv * 0.45) * flick;
  ST.fireLight.distance = warmRadius() * 2.4;
  ST.bands.forEach((b, i) => {
    b.material.emissiveIntensity = 0.7 + Math.sin(t * 6 + i * 2) * 0.3;
  });
  // 溫暖區半徑
  warmZone.scale.setScalar(warmRadius());
  warmEdge.scale.setScalar(warmRadius());
  warmEdge.material.opacity = 0.35 + Math.sin(t * 3) * 0.1;

  // 建設圈
  for (const key in ringMeshes) {
    const r = state.rings[key];
    const lvNow = key === 'furnace' ? state.furnaceLv - 1 : (key === 'bag' ? state.bagLv : state.toolLv);
    const ring = ringMeshes[key];
    const maxed = lvNow >= r.costs.length;
    ring.visible = !maxed && state.phase === 'play';
    if (ring.visible) {
      const paid = (state.paid[key] || 0) / r.costs[lvNow];
      ring.scale.setScalar(1 + Math.sin(t * 4) * 0.05);
      ring.material.color.setHex(paid > 0 ? 0x7aff9d : 0xffffff);
    }
  }

  // 腳印淡出
  for (const fp of footprints) {
    if (fp.life > 0) {
      fp.life -= dt / 3;
      fp.mesh.material.opacity = Math.max(0, fp.life) * 0.32;
    }
  }

  // 雪花
  const pos = snowGeo.attributes.position.array;
  for (let i = 0; i < SNOW_N; i++) {
    pos[i * 3 + 1] -= snowVel[i] * dt;
    pos[i * 3] += Math.sin(t + i) * 7 * dt;
    if (pos[i * 3 + 1] < 0) {
      pos[i * 3 + 1] = 420 + Math.random() * 80;
      pos[i * 3] = camTarget.x - 480 + Math.random() * 960;
      pos[i * 3 + 2] = camTarget.z - 900 + Math.random() * 1500;
    }
  }
  snowGeo.attributes.position.needsUpdate = true;

  // 鏡頭：平滑跟隨，角色保持在畫面中下方
  camTarget.x += (wx(pl.x) - camTarget.x) * Math.min(1, dt * 8);
  camTarget.z += (pl.y - camTarget.z) * Math.min(1, dt * 8);
  const shx = state.shake > 0 ? (Math.random() - .5) * 8 : 0;
  camera.position.set(camTarget.x + shx, CAM_OFF.y, camTarget.z + CAM_OFF.z);
  camera.lookAt(camTarget.x + shx, 0, camTarget.z - 88);

  sun.position.set(camTarget.x + 260, 620, camTarget.z + 160);
  sun.target.position.set(camTarget.x, 0, camTarget.z);
}

// ============ UI ============
function rr(x, y, w, h, r) {
  uiCtx.beginPath();
  uiCtx.moveTo(x + r, y);
  uiCtx.arcTo(x + w, y, x + w, y + h, r);
  uiCtx.arcTo(x + w, y + h, x, y + h, r);
  uiCtx.arcTo(x, y + h, x, y, r);
  uiCtx.arcTo(x, y, x + w, y, r);
  uiCtx.closePath();
}

function drawUI(t) {
  uiCtx.clearRect(0, 0, uiW, uiH);
  const pl = state.player;
  const k = Math.max(0.85, Math.min(1.3, uiW / 420));

  if (!glOK) {
    uiCtx.fillStyle = '#0a1428'; uiCtx.fillRect(0, 0, uiW, uiH);
    uiCtx.fillStyle = '#fff'; uiCtx.font = '16px sans-serif'; uiCtx.textAlign = 'center';
    uiCtx.fillText('此瀏覽器不支援 WebGL，無法執行 3D 遊戲', uiW / 2, uiH / 2);
    return;
  }

  if (state.phase === 'play') {
    // 救援進度圈
    for (const sv of state.survivors) {
      if (sv.state !== 'frozen' || sv.rescueT <= 0) continue;
      const p = toScreen(sv.x, 46, sv.y);
      if (p.behind) continue;
      uiCtx.strokeStyle = 'rgba(255,255,255,.4)'; uiCtx.lineWidth = 5 * k;
      uiCtx.beginPath(); uiCtx.arc(p.x, p.y, 20 * k, 0, 6.28); uiCtx.stroke();
      uiCtx.strokeStyle = '#7affc8';
      uiCtx.beginPath(); uiCtx.arc(p.x, p.y, 20 * k, -1.57, -1.57 + 6.28 * (sv.rescueT / 2)); uiCtx.stroke();
    }
    // 樹/礦血點
    for (const tr of state.trees) {
      if (tr.hp <= 0 || tr.hp >= tr.maxHp) continue;
      const p = toScreen(tr.x, 66, tr.y);
      if (p.behind) continue;
      for (let i = 0; i < tr.maxHp; i++) {
        uiCtx.fillStyle = i < tr.hp ? '#7aff9d' : 'rgba(0,0,0,.35)';
        uiCtx.beginPath(); uiCtx.arc(p.x - (tr.maxHp - 1) * 5 * k / 2 + i * 5 * k, p.y, 2 * k, 0, 6.28); uiCtx.fill();
      }
    }
    for (const rk of state.rocks) {
      if (rk.hp <= 0 || rk.hp >= rk.maxHp) continue;
      const p = toScreen(rk.x, 26, rk.y);
      if (p.behind) continue;
      for (let i = 0; i < rk.maxHp; i++) {
        uiCtx.fillStyle = i < rk.hp ? '#ffd24a' : 'rgba(0,0,0,.35)';
        uiCtx.beginPath(); uiCtx.arc(p.x - (rk.maxHp - 1) * 5 * k / 2 + i * 5 * k, p.y, 2 * k, 0, 6.28); uiCtx.fill();
      }
    }

    // 建設圈標價
    for (const key in state.rings) {
      const r = state.rings[key];
      const lvNow = key === 'furnace' ? state.furnaceLv - 1 : (key === 'bag' ? state.bagLv : state.toolLv);
      if (lvNow >= r.costs.length) continue;
      const p = toScreen(r.x, 0, r.y + 44);
      if (p.behind) continue;
      const cost = r.costs[lvNow];
      const paid = state.paid[key] || 0;
      const resIcon = r.res === 'wood' ? '🪵' : '🪨';
      const txt = r.icon + ' ' + r.label + '  ' + resIcon + Math.ceil(cost - paid);
      uiCtx.font = 'bold ' + (12 * k) + 'px sans-serif';
      const tw = uiCtx.measureText(txt).width;
      uiCtx.fillStyle = 'rgba(12,24,44,.85)';
      rr(p.x - tw / 2 - 10, p.y - 13 * k, tw + 20, 24 * k, 9 * k); uiCtx.fill();
      if (paid > 0) {
        uiCtx.fillStyle = 'rgba(122,255,157,.35)';
        rr(p.x - tw / 2 - 10, p.y - 13 * k, (tw + 20) * (paid / cost), 24 * k, 9 * k); uiCtx.fill();
      }
      uiCtx.fillStyle = '#fff'; uiCtx.textAlign = 'center';
      uiCtx.fillText(txt, p.x, p.y + 4 * k);
    }

    // ===== HUD =====
    const hudY = 12 + safeTop;
    // 資源列
    uiCtx.fillStyle = 'rgba(12,24,44,.8)';
    rr(12, hudY, 210 * k, 36 * k, 12 * k); uiCtx.fill();
    uiCtx.font = 'bold ' + (15 * k) + 'px sans-serif'; uiCtx.textAlign = 'left';
    uiCtx.fillStyle = '#fff';
    uiCtx.fillText('🪵 ' + state.wood, 24, hudY + 24 * k);
    uiCtx.fillText('🪨 ' + state.stone, 92 * k, hudY + 24 * k);
    uiCtx.fillText('🙌 ' + state.rescued + '/' + SURVIVOR_GOAL, 156 * k, hudY + 24 * k);

    // 溫暖度條
    const wbX = uiW - 150 * k - 12, wbW = 150 * k;
    uiCtx.fillStyle = 'rgba(12,24,44,.8)';
    rr(wbX, hudY, wbW, 36 * k, 12 * k); uiCtx.fill();
    uiCtx.font = (15 * k) + 'px sans-serif';
    uiCtx.fillText('🌡️', wbX + 8, hudY + 24 * k);
    uiCtx.fillStyle = 'rgba(255,255,255,.16)';
    rr(wbX + 34 * k, hudY + 11 * k, wbW - 44 * k, 14 * k, 7 * k); uiCtx.fill();
    const wr = state.warmth / 100;
    const warmCol = wr > .4 ? '#ff9d3c' : (wr > .15 ? '#ffd24a' : '#7ab8e0');
    uiCtx.fillStyle = warmCol;
    if (wr > .03) { rr(wbX + 34 * k, hudY + 11 * k, (wbW - 44 * k) * wr, 14 * k, 7 * k); uiCtx.fill(); }

    // 目標 / 背包
    uiCtx.fillStyle = 'rgba(12,24,44,.6)';
    rr(12, hudY + 42 * k, 260 * k, 24 * k, 8 * k); uiCtx.fill();
    uiCtx.fillStyle = '#aee2ff';
    uiCtx.font = 'bold ' + (11 * k) + 'px sans-serif'; uiCtx.textAlign = 'left';
    uiCtx.fillText('目標：火爐升到 Lv.' + FURNACE_MAX + '（現在 Lv.' + state.furnaceLv + '）＋ 救回所有生還者', 22, hudY + 58 * k);
    uiCtx.fillStyle = 'rgba(12,24,44,.6)';
    rr(uiW - 86 * k - 12, hudY + 42 * k, 86 * k, 24 * k, 8 * k); uiCtx.fill();
    uiCtx.fillStyle = carried() >= bagCap() ? '#ffd24a' : '#fff';
    uiCtx.fillText('🎒 ' + carried() + '/' + bagCap(), uiW - 78 * k - 12, hudY + 58 * k);

    // 寒冷警告 + 結霜邊框
    const coldness = 1 - state.warmth / 100;
    if (coldness > 0.55) {
      const v = uiCtx.createRadialGradient(uiW / 2, uiH / 2, uiH * .25, uiW / 2, uiH / 2, uiH * .7);
      v.addColorStop(0, 'rgba(140,190,255,0)');
      v.addColorStop(1, 'rgba(120,170,230,' + Math.min(.75, (coldness - .55) * 1.8) + ')');
      uiCtx.fillStyle = v;
      uiCtx.fillRect(0, 0, uiW, uiH);
    }
    if (state.warmth < 30 && pl.collapseT <= 0) {
      uiCtx.fillStyle = 'rgba(160,210,255,' + (0.6 + Math.sin(t * 6) * 0.3) + ')';
      uiCtx.font = 'bold ' + (17 * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.fillText('🥶 太冷了！快回火爐取暖', uiW / 2, hudY + 96 * k);
    }
    if (pl.collapseT > 0) {
      uiCtx.fillStyle = 'rgba(40,70,120,.4)';
      uiCtx.fillRect(0, 0, uiW, uiH);
      uiCtx.fillStyle = '#fff';
      uiCtx.font = 'bold ' + (22 * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.fillText('🥶 凍倒了…被拖回火爐邊', uiW / 2, uiH / 2 - 40);
    }

    // 目標箭頭
    let gx = null, gy = null, cheapest = null;
    for (const key in state.rings) {
      const r = state.rings[key];
      const lvNow = key === 'furnace' ? state.furnaceLv - 1 : (key === 'bag' ? state.bagLv : state.toolLv);
      if (lvNow >= r.costs.length) continue;
      const c = r.costs[lvNow] - (state.paid[key] || 0);
      if (state[r.res] >= c && (!cheapest || c < cheapest.c)) cheapest = { r, c };
    }
    if (carried() >= bagCap() * 0.99) { gx = FURNACE.x; gy = FURNACE.y; }
    else if (cheapest) { gx = cheapest.r.x; gy = cheapest.r.y; }
    else {
      let bd = 1e9;
      for (const sv of state.survivors) {
        if (sv.state !== 'frozen') continue;
        const d = Math.hypot(sv.x - pl.x, sv.y - pl.y);
        if (d < bd) { bd = d; gx = sv.x; gy = sv.y; }
      }
      if (gx === null) {
        for (const tr of state.trees) {
          if (tr.hp <= 0) continue;
          const d = Math.hypot(tr.x - pl.x, tr.y - pl.y);
          if (d < bd) { bd = d; gx = tr.x; gy = tr.y; }
        }
      }
    }
    if (gx !== null && pl.collapseT <= 0 && Math.hypot(gx - pl.x, gy - pl.y) > 130) {
      const pp = toScreen(pl.x, 30, pl.y);
      const tp = toScreen(gx, 0, gy);
      const a = Math.atan2(tp.y - pp.y, tp.x - pp.x);
      const bounce = Math.sin(t * 5) * 5;
      uiCtx.save();
      uiCtx.translate(pp.x + Math.cos(a) * (64 + bounce) * k, pp.y + Math.sin(a) * (64 + bounce) * k);
      uiCtx.rotate(a + Math.PI / 2);
      uiCtx.fillStyle = '#52e06a';
      uiCtx.beginPath();
      uiCtx.moveTo(0, -14 * k); uiCtx.lineTo(10 * k, 2 * k); uiCtx.lineTo(4 * k, 2 * k); uiCtx.lineTo(4 * k, 11 * k);
      uiCtx.lineTo(-4 * k, 11 * k); uiCtx.lineTo(-4 * k, 2 * k); uiCtx.lineTo(-10 * k, 2 * k);
      uiCtx.closePath(); uiCtx.fill();
      uiCtx.strokeStyle = 'rgba(255,255,255,.85)'; uiCtx.lineWidth = 1.6; uiCtx.stroke();
      uiCtx.restore();
    }

    // 搖桿
    if (joy) {
      uiCtx.strokeStyle = 'rgba(255,255,255,.45)'; uiCtx.lineWidth = 3;
      uiCtx.beginPath(); uiCtx.arc(joy.sx, joy.sy, JOY_R, 0, 6.28); uiCtx.stroke();
      const d = Math.hypot(joy.dx, joy.dy) || 1;
      const kk = Math.min(d, JOY_R - 2);
      uiCtx.fillStyle = 'rgba(255,255,255,.5)';
      uiCtx.beginPath(); uiCtx.arc(joy.sx + joy.dx / d * kk, joy.sy + joy.dy / d * kk, 17, 0, 6.28); uiCtx.fill();
    }
  }

  // 粒子
  for (const p of particles2d) {
    uiCtx.globalAlpha = Math.max(0, p.life * 2.5);
    uiCtx.fillStyle = p.color;
    uiCtx.fillRect(p.x - 2.5, p.y - 2.5, 5, 5);
  }
  uiCtx.globalAlpha = 1;

  // 漂浮文字
  for (const f of floatTexts) {
    const p = toScreen(f.x, f.h, f.y);
    if (!p.behind) {
      uiCtx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.6));
      uiCtx.fillStyle = f.color;
      uiCtx.font = 'bold ' + (f.size * k) + 'px sans-serif'; uiCtx.textAlign = 'center';
      uiCtx.strokeStyle = 'rgba(10,20,40,.6)'; uiCtx.lineWidth = 3;
      uiCtx.strokeText(f.text, p.x, p.y);
      uiCtx.fillText(f.text, p.x, p.y);
    }
  }
  uiCtx.globalAlpha = 1;

  if (state.phase === 'title') {
    drawOverlay('❄️ 寒霜營地 ❄️', [
      '冰原中央的火爐，是唯一的溫暖。',
      '',
      '🕹️ 單指拖曳移動，靠近就會自動行動',
      '🪓 站在樹旁自動砍柴　⛏️ 站在礦旁自動採石',
      '🎒 資源揹在背上，走回火爐自動存放',
      '🥶 離火爐越遠越冷，凍倒會掉資源！',
      '🧊 救出冰封的生還者，他們會幫你砍柴',
      '',
      '⭕ 站上白圈升級：火爐・背包・工具',
      '火爐升到 Lv.' + FURNACE_MAX + ' 並救回 ' + SURVIVOR_GOAL + ' 人即獲勝！'
    ], '點擊開始', k);
  } else if (state.phase === 'win') {
    drawOverlay('🏆 營地重獲生機！', [
      '火爐熊熊燃燒，所有生還者都獲救了！',
      '',
      '⏱️ 用時：' + Math.floor(state.time / 60) + ' 分 ' + Math.floor(state.time % 60) + ' 秒',
      '🪵 砍柴：' + state.chopped + '　🪨 採石：' + state.mined,
      '🙌 救援：' + state.rescued + ' 人',
      '🥶 凍倒：' + state.collapses + ' 次'
    ], '再玩一次', k);
  }
}

function drawOverlay(title, lines, btnText, k) {
  uiCtx.fillStyle = 'rgba(10,22,42,.62)';
  uiCtx.fillRect(0, 0, uiW, uiH);
  uiCtx.textAlign = 'center';
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold ' + (30 * k) + 'px sans-serif';
  uiCtx.fillText(title, uiW / 2, uiH / 2 - 160 * k);
  uiCtx.fillStyle = '#dce8f5';
  uiCtx.font = (14.5 * k) + 'px sans-serif';
  lines.forEach((l, i) => uiCtx.fillText(l, uiW / 2, uiH / 2 - 110 * k + i * 27 * k));
  const pulse = 1 + Math.sin(performance.now() / 300) * .04;
  uiCtx.save();
  uiCtx.translate(uiW / 2, uiH / 2 + 185 * k); uiCtx.scale(pulse, pulse);
  uiCtx.fillStyle = '#c25b1e';
  rr(-105 * k, -27 * k, 210 * k, 54 * k, 15 * k); uiCtx.fill();
  uiCtx.fillStyle = '#fff';
  uiCtx.font = 'bold ' + (20 * k) + 'px sans-serif';
  uiCtx.fillText(btnText, 0, 7 * k);
  uiCtx.restore();
  uiCtx.fillStyle = 'rgba(255,255,255,.6)';
  uiCtx.font = (12 * k) + 'px sans-serif';
  uiCtx.fillText('📱 iPhone：Safari「分享 → 加入主畫面」可全螢幕遊玩', uiW / 2, uiH - 52 - safeBot);
  uiCtx.fillText('原創粉絲自製小遊戲・與任何遊戲公司無關', uiW / 2, uiH - 30 - safeBot);
}

// ============ 主迴圈 ============
let last = performance.now();
function loop(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  const t = now / 1000;
  update(dt);
  syncGraphics(dt, t);
  if (renderer) renderer.render(scene, camera);
  drawUI(t);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
